<script id="metrics">
"use strict";
(function (w) {
  const WEEKLY_GOAL = { runs: 3, minutes: 150 };

  // 一天算一次 run:同日多筆 cardio 合併(距離相加、時間相加)。
  // 資料必須完整(date / duration_min / distance_km),殘缺的丟進 invalid,不靜默略過。
  function buildDayRuns(sessions) {
    const byDate = new Map();
    const invalid = [];
    (sessions || []).forEach((s) => {
      const date = s && s.date;
      (s && s.cardio ? s.cardio : []).forEach((c) => {
        const min = c && c.duration_min;
        const km = c && c.distance_km;
        const okMin = typeof min === "number" && isFinite(min) && min > 0;
        const okKm = typeof km === "number" && isFinite(km) && km > 0;
        if (!date || !okMin || !okKm) {
          invalid.push({
            date: date || "(no date)",
            reason: !date ? "missing date" : !okKm ? "missing distance_km" : "missing duration_min",
          });
          return;
        }
        const cur = byDate.get(date) || { date: date, km: 0, min: 0 };
        cur.km += km;
        cur.min += min;
        byDate.set(date, cur);
      });
    });
    const runs = [...byDate.values()]
      .map((r) => ({ date: r.date, km: Math.round(r.km * 100) / 100, min: r.min }))
      .sort((a, b) => a.date.localeCompare(b.date));
    return { runs: runs, invalid: invalid };
  }

  // 配速 min/km -> "m:ss"
  function formatPace(p) {
    if (typeof p !== "number" || !isFinite(p) || p <= 0) return "—";
    const mm = Math.floor(p);
    const ss = Math.round((p - mm) * 60);
    return ss === 60 ? mm + 1 + ":00" : mm + ":" + String(ss).padStart(2, "0");
  }

  w.MonkeyMetrics = { WEEKLY_GOAL: WEEKLY_GOAL, buildDayRuns: buildDayRuns, formatPace: formatPace };
})(typeof window !== "undefined" ? window : this);
</script>
