<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Monkey — Tanoi</title>
<style>
  :root {
    --bg: #070708; --card: #111214; --border: #212328;
    --ink: #e9ecef; --muted: #7f858e;
    --accent: #c9f24d; --accent-dim: #7fae35;
    --person: #b558ff;
    --streak: #ffb648; --streak-bg: #1a1408; --streak-border: #4a3a12;
    --hm0: #17191c; --hm1: #2f4419; --hm2: #5f8a26; --hm3: #c9f24d;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--ink);
    font-family: "Segoe UI", system-ui, sans-serif; line-height: 1.5;
  }
  .wrap { max-width: 1100px; margin: 0 auto; padding: 18px 16px 60px; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 14px 16px; min-width: 0; }
  .row { display: flex; gap: 12px; }
  .lbl { font-size: 10px; letter-spacing: 1.1px; color: var(--muted); font-weight: 600; }
  .num { font-family: Consolas, ui-monospace, monospace; font-weight: 700; }
  .lime { color: var(--accent); }

  header.hero {
    display: flex; align-items: center; gap: 14px;
    background: radial-gradient(600px 120px at 8% -30%, rgba(181, 88, 255, .25), transparent), #0d0e10;
    border: 1px solid var(--border); border-radius: 16px; padding: 14px 16px;
  }
  /* 頭像:光暈脈動(呼吸),點下去放大看原圖 */
  .avatar { width: 62px; height: 62px; border-radius: 50%; flex: 0 0 auto; object-fit: cover;
    border: 2px solid var(--person); cursor: zoom-in;
    animation: avatarPulse 2.2s ease-in-out infinite; transition: transform .15s; }
  .avatar:hover { transform: scale(1.06); }
  @keyframes avatarPulse {
    0%, 100% { box-shadow: 0 0 13px rgba(181, 88, 255, .35); }
    50%      { box-shadow: 0 0 19px rgba(181, 88, 255, .8); }
  }
  @media (prefers-reduced-motion: reduce) {
    .avatar { animation: none; box-shadow: 0 0 16px rgba(181, 88, 255, .5); }
  }

  /* 放大檢視 */
  #lightbox { position: fixed; inset: 0; z-index: 100; display: none;
    align-items: center; justify-content: center; padding: 24px;
    background: rgba(4, 4, 5, .88); backdrop-filter: blur(6px); cursor: zoom-out; }
  #lightbox.on { display: flex; }
  #lightbox img { max-width: min(90vw, 640px); max-height: 86vh; border-radius: 18px;
    border: 2px solid var(--person); box-shadow: 0 0 60px rgba(181, 88, 255, .45);
    animation: lbIn .18s ease-out; }
  @keyframes lbIn { from { opacity: 0; transform: scale(.94); } to { opacity: 1; transform: scale(1); } }
  #lightbox .close { position: absolute; top: 18px; right: 22px; font-size: 26px; line-height: 1;
    color: var(--muted); background: none; border: 0; cursor: pointer; font-family: inherit; }
  #lightbox .close:hover { color: var(--ink); }
  .who { font-size: 19px; font-weight: 800; letter-spacing: .5px; }
  .who i { color: var(--person); font-style: normal; }
  .streak { margin-left: auto; display: flex; align-items: center; gap: 8px;
    background: var(--streak-bg); border: 1px solid var(--streak-border); border-radius: 999px; padding: 7px 14px; }
  .streak .n { font-size: 20px; font-weight: 800; color: var(--streak); font-family: Consolas, monospace; }

  h2.sec { font-size: 10px; letter-spacing: 1.1px; color: var(--muted); font-weight: 600; margin: 18px 2px 8px; }

  .ring { width: 92px; height: 92px; border-radius: 50%; flex: 0 0 auto;
    display: flex; align-items: center; justify-content: center; }
  .ring.done { box-shadow: 0 0 18px rgba(201, 242, 77, .45); }
  .ring > div { width: 70px; height: 70px; border-radius: 50%; background: var(--card);
    display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .ring .v { font-size: 17px; font-weight: 800; font-family: Consolas, monospace; }
  .xp { height: 9px; border-radius: 999px; background: #1e2126; overflow: hidden; }
  .xp > i { display: block; height: 100%; border-radius: 999px;
    background: linear-gradient(90deg, var(--accent-dim), var(--accent)); box-shadow: 0 0 10px rgba(201, 242, 77, .6); }
  .qcol { display: flex; align-items: center; gap: 14px; flex: 1 1 0; min-width: 0; }
  .qsep { width: 1px; background: var(--border); align-self: stretch; }
  .qprog { flex: 1.1 1 0; min-width: 0; }

  .pr { flex: 1 1 0; min-width: 0; text-align: center; padding: 16px 10px; background: var(--card);
    border: 1px solid var(--border); border-radius: 16px; position: relative; }
  .pr.new { border-color: var(--accent); box-shadow: 0 0 18px rgba(201, 242, 77, .28); }
  .pr .t { font-size: 26px; line-height: 1; }
  .pr .v { font-size: 23px; font-weight: 800; margin-top: 6px; font-family: Consolas, monospace; }
  .pr .d { font-size: 10px; color: var(--muted); margin-top: 3px; }
  .pr .tag { position: absolute; top: -8px; right: 10px; background: var(--accent); color: #0a0a0a;
    font-size: 9px; font-weight: 800; padding: 2px 7px; border-radius: 999px; letter-spacing: .5px; }

  .bars { display: flex; align-items: flex-end; gap: 8px; height: 88px; }
  .bars i { flex: 1; background: #22262b; border-radius: 5px 5px 2px 2px; display: block; min-height: 2px; }
  .bars i.on { background: linear-gradient(180deg, var(--accent), var(--accent-dim)); }
  .barx { display: flex; font-size: 9px; color: var(--muted); margin-top: 6px; }
  .barx span { flex: 1; text-align: center; }
  .paceBig { font-size: 40px; margin: 8px 0 2px; }

  /* 熱力圖:一年 53 欄放不進手機,自己在容器內橫向捲動,捲軸配合頁面改成細螢光綠 */
  .hmScroll { overflow-x: auto; padding-bottom: 10px; flex: 1 1 auto; min-width: 0;
    scrollbar-width: thin; scrollbar-color: var(--accent) #15171a; }
  .hmScroll::-webkit-scrollbar { height: 7px; }
  .hmScroll::-webkit-scrollbar-track { background: #15171a; border-radius: 99px; }
  .hmScroll::-webkit-scrollbar-thumb { background: linear-gradient(90deg, var(--accent-dim), var(--accent));
    border-radius: 99px; box-shadow: 0 0 7px rgba(201, 242, 77, .5); }
  /* 星期標籤放在捲動容器「外面」的獨立一欄,否則捲到最右時它會跟著消失 */
  .hmBody { display: flex; gap: 6px; align-items: flex-start; }
  .hmDays { display: grid; grid-template-rows: repeat(7, 13px); gap: 4px; font-size: 9px; color: var(--muted);
    flex: 0 0 auto; margin-top: 19px; }
  .hmDays span { display: flex; align-items: center; height: 13px; }
  .hmGrid { display: grid; grid-auto-flow: column; grid-template-rows: repeat(7, 13px); gap: 4px; }
  .hmGrid i { width: 13px; height: 13px; border-radius: 3px; display: block; background: var(--hm0); }
  .hmGrid i.l1 { background: var(--hm1); }
  .hmGrid i.l2 { background: var(--hm2); }
  .hmGrid i.l3 { background: var(--hm3); box-shadow: 0 0 7px rgba(201, 242, 77, .45); }
  .hmGrid i.empty { background: transparent; }
  .hmMon { display: grid; grid-auto-flow: column; gap: 4px; font-size: 9px; color: var(--muted);
    margin-bottom: 5px; }
  .hmLegend { display: flex; align-items: center; gap: 6px; font-size: 9px; color: var(--muted);
    margin-top: 12px; justify-content: flex-end; }
  .hmLegend i { width: 11px; height: 11px; border-radius: 3px; display: inline-block; }
  /* 年份切換:窄螢幕時整列往下換行,不去擠壓標題 */
  .hmTabs { display: flex; flex-wrap: wrap; gap: 6px; justify-content: flex-end; }
  .hmTab { font: inherit; font-size: 10px; font-weight: 700; letter-spacing: .5px; cursor: pointer;
    padding: 4px 10px; border-radius: 99px; border: 1px solid var(--border); background: transparent;
    color: var(--muted); transition: color .15s, border-color .15s, box-shadow .15s; }
  .hmTab:hover { color: var(--ink); border-color: var(--accent-dim); }
  .hmTab.on { color: var(--accent); border-color: var(--accent);
    box-shadow: 0 0 12px rgba(201, 242, 77, .25); }

  #dataErrors { margin-top: 24px; font-size: 12px; color: #ff8a8a;
    border: 1px solid #4a1414; background: #1a0c0c; border-radius: 12px; padding: 10px 14px; }
  #dataErrors:empty { display: none; }

  @media (max-width: 640px) {
    .wrap { padding: 12px 12px 48px; }
    header.hero { gap: 12px; padding: 12px 14px; flex-wrap: wrap; }
    .avatar { width: 52px; height: 52px; }
    .who { font-size: 17px; }
    .streak { margin-left: 0; width: 100%; justify-content: center; margin-top: 10px; }
    .row { flex-direction: column; }

    /* 兩個 quest 環在手機仍並排(縮小),讓一屏內還看得到 PR 榜;
       經驗值條擠不進同一列,改成整條 wrap 到兩環下方 */
    .qwrap { flex-direction: row !important; flex-wrap: wrap; gap: 10px; }
    .qcol { flex-direction: column; gap: 8px; text-align: center; }
    .qsep { display: none; }
    .qprog { flex: 1 0 100%; }
    .ring { width: 84px; height: 84px; }
    .ring > div { width: 64px; height: 64px; }

    #prBoard { flex-direction: row !important; gap: 8px; }
    .pr { padding: 12px 4px; }
    .pr .t { font-size: 20px; }
    .pr .v { font-size: 17px; }
    .pr .d { font-size: 9px; }
    .pr .tag { right: 4px; }
    .pr .lbl { letter-spacing: .3px; }

    /* 手機順序:AVG PACE 排在 WEEKLY DISTANCE 之前 */
    #avgPace { order: -1; }
    .paceBig { font-size: 38px; }
    .bars { height: 74px; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header class="hero">
    <img class="avatar" id="avatar" src="profile/monkey.jpg" alt="Monkey" title="Tap to view" />
    <div>
      <div class="who">MONKEY <i>·</i> TANOI</div>
      <div class="lbl" id="totals" style="margin-top:3px"></div>
    </div>
    <div class="streak">
      <span style="font-size:20px">🔥</span>
      <div class="n" id="streakVal">0</div>
      <div class="lbl" style="line-height:1.2">WEEK<br />STREAK</div>
    </div>
  </header>

  <div class="card" id="quest" style="margin-top:12px"></div>

  <h2 class="sec">🏆 PERSONAL RECORDS</h2>
  <div class="row" id="prBoard"></div>

  <div class="row" style="margin-top:12px">
    <div class="card" id="weeklyDist" style="flex:2.2"></div>
    <div class="card" id="avgPace"
      style="flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center"></div>
  </div>

  <div class="card" id="activity" style="margin-top:12px"></div>

  <div id="dataErrors"></div>
</div>

<div id="lightbox">
  <button class="close" aria-label="Close">✕</button>
  <img src="profile/monkey.jpg" alt="Monkey" />
</div>

<script>
/* 資料由 build 腳本注入此標記區塊,請勿手改 START/END 之間(目前為樣本資料) */
/*WORKOUT_DATA_START*/window.WORKOUT_DATA={"generated_at":"2026-07-13T02:44:59.304Z","session_count":2,"sessions":[{"date":"2026-07-07","type":"Cardio","strength":[],"cardio":[{"exercise":"Running","duration_min":30,"distance_km":3.1}],"note":null},{"date":"2026-07-12","type":"Cardio","strength":[],"cardio":[{"exercise":"Running","duration_min":30,"distance_km":3,"avg_hr_bpm":140}],"note":null}]};/*WORKOUT_DATA_END*/
</script>

<script id="metrics">
"use strict";
(function (w) {
  const WEEKLY_GOAL = { runs: 3, minutes: 150 };

  // 一天算一次 run:同日多筆 cardio 合併(距離相加、時間相加)。
  // 資料必須完整(date / duration_min / distance_km),殘缺的丟進 invalid,不靜默略過。
  function buildDayRuns(sessions) {
    const byDate = new Map();
    const invalid = [];
    (sessions || []).forEach((s) => {
      const date = s && s.date;
      (s && s.cardio ? s.cardio : []).forEach((c) => {
        const min = c && c.duration_min;
        const km = c && c.distance_km;
        const okMin = typeof min === "number" && isFinite(min) && min > 0;
        const okKm = typeof km === "number" && isFinite(km) && km > 0;
        if (!date || !okMin || !okKm) {
          invalid.push({
            date: date || "(no date)",
            reason: !date ? "missing date" : !okKm ? "missing distance_km" : "missing duration_min",
          });
          return;
        }
        const cur = byDate.get(date) || { date: date, km: 0, min: 0 };
        cur.km += km;
        cur.min += min;
        byDate.set(date, cur);
      });
    });
    const runs = [...byDate.values()]
      .map((r) => ({ date: r.date, km: Math.round(r.km * 100) / 100, min: r.min }))
      .sort((a, b) => a.date.localeCompare(b.date));
    return { runs: runs, invalid: invalid };
  }

  // 配速 min/km -> "m:ss"
  function formatPace(p) {
    if (typeof p !== "number" || !isFinite(p) || p <= 0) return "—";
    const mm = Math.floor(p);
    const ss = Math.round((p - mm) * 60);
    return ss === 60 ? mm + 1 + ":00" : mm + ":" + String(ss).padStart(2, "0");
  }

  const DAY = 86400000;
  const toDate = (s) => new Date(s + "T00:00:00");
  const toStr = (d) =>
    d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0");

  // 週一為一週之始
  function weekStart(dateStr) {
    const d = toDate(dateStr);
    const back = (d.getDay() + 6) % 7; // 週一 = 0
    d.setDate(d.getDate() - back);
    return toStr(d);
  }
  function addDays(dateStr, n) {
    const d = toDate(dateStr);
    d.setDate(d.getDate() + n);
    return toStr(d);
  }

  function weekAgg(dayRuns) {
    const map = new Map();
    dayRuns.forEach((r) => {
      const k = weekStart(r.date);
      const cur = map.get(k) || { runs: 0, km: 0, min: 0 };
      cur.runs += 1;
      cur.km += r.km;
      cur.min += r.min;
      map.set(k, cur);
    });
    return map;
  }

  const isCompleteWeek = (a) => !!a && a.runs >= WEEKLY_GOAL.runs && a.min >= WEEKLY_GOAL.minutes;

  function currentQuest(dayRuns, todayStr) {
    const ws = weekStart(todayStr);
    const a = weekAgg(dayRuns).get(ws) || { runs: 0, km: 0, min: 0 };
    const runsPct = Math.min(1, a.runs / WEEKLY_GOAL.runs);
    const minutesPct = Math.min(1, a.min / WEEKLY_GOAL.minutes);
    const weekEnd = addDays(ws, 6);
    const daysLeft = Math.round((toDate(weekEnd) - toDate(todayStr)) / DAY) + 1;
    return {
      weekStart: ws,
      weekEnd: weekEnd,
      runs: a.runs,
      minutes: a.min,
      km: Math.round(a.km * 100) / 100,
      runsPct: runsPct,
      minutesPct: minutesPct,
      questPct: (runsPct + minutesPct) / 2,
      complete: isCompleteWeek(a),
      daysLeft: Math.max(0, daysLeft),
    };
  }

  // 連續達標週。本週還沒結束 -> 未達標不算斷,已達標則計入。
  function streak(dayRuns, todayStr) {
    const agg = weekAgg(dayRuns);
    let cursor = weekStart(todayStr);
    let n = 0;
    if (isCompleteWeek(agg.get(cursor))) n += 1;
    cursor = addDays(cursor, -7);
    while (isCompleteWeek(agg.get(cursor))) {
      n += 1;
      cursor = addDays(cursor, -7);
    }
    return n;
  }

  // 短跑很容易刷出漂亮配速,設距離門檻擋掉,否則 PR 榜會被一次 1 km 衝刺永久霸榜。
  const MIN_PR_KM = 2;
  const paceOf = (r) => r.min / r.km;

  function personalRecords(dayRuns) {
    if (!dayRuns.length) {
      return {
        fastestPace: null, longestRun: null, longestTime: null,
        isNew: { fastestPace: false, longestRun: false, longestTime: false },
      };
    }
    const lastDate = dayRuns[dayRuns.length - 1].date;
    // dayRuns 已依日期升冪;用嚴格大於/小於比較,平手時保留較早的那筆,不會誤觸發 NEW
    let fp = null, lr = null, lt = null;
    dayRuns.forEach((r) => {
      if (r.km >= MIN_PR_KM && (!fp || paceOf(r) < fp.pace)) fp = { pace: paceOf(r), date: r.date, km: r.km };
      if (!lr || r.km > lr.km) lr = { km: r.km, date: r.date };
      if (!lt || r.min > lt.min) lt = { min: r.min, date: r.date };
    });
    return {
      fastestPace: fp,
      longestRun: lr,
      longestTime: lt,
      isNew: {
        fastestPace: !!fp && fp.date === lastDate,
        longestRun: !!lr && lr.date === lastDate,
        longestTime: !!lt && lt.date === lastDate,
      },
    };
  }

  // 最近 5 次的加權平均配速(Σmin / Σkm)。用累積平均的話後期會鈍化,跑再快也推不動數字。
  // deltaSec 與「前 5 次」比較,正值 = 變快。
  function avgPace(dayRuns) {
    const wavg = (arr) => {
      const km = arr.reduce((a, r) => a + r.km, 0);
      const min = arr.reduce((a, r) => a + r.min, 0);
      return km > 0 ? min / km : null;
    };
    const last5 = dayRuns.slice(-5);
    const prev5 = dayRuns.slice(-10, -5);
    const pace = last5.length ? wavg(last5) : null;
    const prev = prev5.length === 5 ? wavg(prev5) : null;
    return {
      pace: pace,
      deltaSec: pace != null && prev != null ? (prev - pace) * 60 : null,
      sampleSize: last5.length,
    };
  }

  function weeklyDistance(dayRuns, todayStr, n) {
    n = n || 8;
    const agg = weekAgg(dayRuns);
    const cur = weekStart(todayStr);
    const out = [];
    for (let i = n - 1; i >= 0; i--) {
      const ws = addDays(cur, -7 * i);
      const a = agg.get(ws);
      out.push({ weekStart: ws, km: a ? Math.round(a.km * 10) / 10 : 0, isCurrent: i === 0 });
    }
    return out;
  }

  const heatmapLevel = (km) => (km <= 0 ? 0 : km <= 3 ? 1 : km <= 6 ? 2 : 3);

  // 熱力圖的唯一產生器:把 [fromDate..toDate] 切成一欄一週(週一~週日)。
  // 區間外(首尾那兩欄的邊角)與今天之後的格子都是 null,畫成透明格。
  // RECENT 與各年份 tab 共用它——規則只有一份,不會偷偷分岔。
  function heatmapRange(dayRuns, fromDate, toDate, todayStr) {
    const byDate = new Map(dayRuns.map((r) => [r.date, r]));
    const lastWeek = weekStart(toDate);
    const weeks = [];
    let totalRuns = 0;
    for (let ws = weekStart(fromDate); ws <= lastWeek; ws = addDays(ws, 7)) {
      const col = [];
      for (let d = 0; d < 7; d++) {
        const date = addDays(ws, d);
        if (date < fromDate || date > toDate || date > todayStr) { col.push(null); continue; }
        const r = byDate.get(date);
        const km = r ? r.km : 0;
        if (r) totalRuns += 1;
        col.push({ date: date, km: km, level: heatmapLevel(km) });
      }
      weeks.push(col);
    }
    return { weeks: weeks, totalRuns: totalRuns, firstDate: fromDate };
  }

  // RECENT:過去 365 天(含今天)。365 = 52 週 + 1 天 -> 53 欄,首欄不完整。
  const HEATMAP_DAYS = 365;
  function heatmap(dayRuns, todayStr) {
    return heatmapRange(dayRuns, addDays(todayStr, -(HEATMAP_DAYS - 1)), todayStr, todayStr);
  }

  // 日曆年:1/1 ~ 12/31。當年還沒過完的話,今天之後的格子是空的。
  function heatmapYear(dayRuns, year, todayStr) {
    return heatmapRange(dayRuns, year + "-01-01", year + "-12-31", todayStr);
  }

  // tab 用的年份清單:最早有資料的年份 ~ 今年,連續列出(中間空白年份也列,否則 tab 會跳號)。
  // 今年之後的年份不列——未來日期的資料不該生出未來的 tab。
  function heatmapYears(dayRuns, todayStr) {
    const thisYear = Number(todayStr.slice(0, 4));
    const first = dayRuns.reduce(
      (min, r) => Math.min(min, Number(r.date.slice(0, 4))), thisYear);
    const out = [];
    for (let y = thisYear; y >= first; y--) out.push(y);
    return out;
  }

  w.MonkeyMetrics = {
    WEEKLY_GOAL: WEEKLY_GOAL,
    MIN_PR_KM: MIN_PR_KM,
    weeklyDistance: weeklyDistance,
    heatmapLevel: heatmapLevel,
    HEATMAP_DAYS: HEATMAP_DAYS,
    heatmapRange: heatmapRange,
    heatmap: heatmap,
    heatmapYear: heatmapYear,
    heatmapYears: heatmapYears,
    buildDayRuns: buildDayRuns,
    formatPace: formatPace,
    weekStart: weekStart,
    addDays: addDays,
    weekAgg: weekAgg,
    isCompleteWeek: isCompleteWeek,
    currentQuest: currentQuest,
    streak: streak,
    personalRecords: personalRecords,
    avgPace: avgPace,
  };
})(typeof window !== "undefined" ? window : this);
</script>

<script id="render">
"use strict";
(function () {
  const M = window.MonkeyMetrics;
  const D = window.WORKOUT_DATA || { sessions: [] };
  const dr = M.buildDayRuns(D.sessions);
  const runs = dr.runs;
  const invalid = dr.invalid;

  // 真實今天(本地時區)。quest 的「本週」「剩幾天」、streak、熱力圖最右一格都以此為準。
  const now = new Date();
  const TODAY = now.getFullYear() + "-" +
    String(now.getMonth() + 1).padStart(2, "0") + "-" +
    String(now.getDate()).padStart(2, "0");

  const el = (id) => document.getElementById(id);
  const round1 = (n) => Math.round(n * 10) / 10;
  const plural = (n, word) => n + " " + word + (n === 1 ? "" : "S");

  // 頁首:累積數字 + streak
  const totalKm = round1(runs.reduce((a, r) => a + r.km, 0));
  const totalMin = runs.reduce((a, r) => a + r.min, 0);
  el("totals").innerHTML =
    'TOTAL <span class="num lime" style="font-size:13px">' + totalKm + " km</span> · " +
    plural(runs.length, "RUN") + " · " + round1(totalMin / 60) + " HRS";
  el("streakVal").textContent = M.streak(runs, TODAY);

  // WEEKLY QUEST
  const q = M.currentQuest(runs, TODAY);
  const G = M.WEEKLY_GOAL;
  const ringStyle = (pct) => {
    const p = (pct * 100).toFixed(1);
    return "background:conic-gradient(var(--accent) 0 " + p + "%, var(--border) " + p + "% 100%)";
  };
  el("quest").innerHTML =
    '<div style="display:flex;justify-content:space-between;align-items:baseline">' +
      '<div class="lbl">WEEKLY QUEST · ' + q.weekStart + " → " + q.weekEnd + "</div>" +
      '<div class="lbl">' + q.daysLeft + " DAY" + (q.daysLeft === 1 ? "" : "S") + " LEFT</div>" +
    "</div>" +
    '<div class="row qwrap" style="margin-top:12px;align-items:center">' +
      '<div class="qcol">' +
        '<div class="ring' + (q.runsPct >= 1 ? " done" : "") + '" style="' + ringStyle(q.runsPct) + '">' +
          '<div><div class="v' + (q.runsPct >= 1 ? " lime" : "") + '">' + q.runs + "/" + G.runs + "</div>" +
          '<div class="lbl" style="font-size:9px">RUNS</div></div></div>' +
        '<div><div class="lbl">RUNS · GOAL ' + G.runs + "</div>" +
          (q.runsPct >= 1
            ? '<div style="font-size:15px;font-weight:700;color:var(--accent)">✓ COMPLETE</div>'
            : '<div style="font-size:15px;font-weight:700">' + (G.runs - q.runs) + " to go</div>") +
        "</div>" +
      "</div>" +
      '<div class="qsep"></div>' +
      '<div class="qcol">' +
        '<div class="ring' + (q.minutesPct >= 1 ? " done" : "") + '" style="' + ringStyle(q.minutesPct) + '">' +
          '<div><div class="v' + (q.minutesPct >= 1 ? " lime" : "") + '">' + Math.round(q.minutesPct * 100) + "%</div>" +
          '<div class="lbl" style="font-size:9px">TIME</div></div></div>' +
        '<div><div class="lbl">TIME · GOAL ' + G.minutes + " MIN</div>" +
          '<div style="font-size:15px;font-weight:700"><span class="num">' + q.minutes + "</span>" +
          '<span style="color:var(--muted);font-size:12px"> / ' + G.minutes + " min</span></div>" +
          (q.minutesPct >= 1
            ? ""
            : '<div style="font-size:11px;color:var(--muted);margin-top:2px">' + (G.minutes - q.minutes) + " min to go</div>") +
        "</div>" +
      "</div>" +
      '<div class="qprog">' +
        '<div class="lbl">QUEST PROGRESS</div>' +
        '<div class="xp" style="margin-top:7px"><i style="width:' + (q.questPct * 100).toFixed(1) + '%"></i></div>' +
        '<div style="font-size:11px;color:var(--muted);margin-top:6px">Complete both to keep the streak alive</div>' +
      "</div>" +
    "</div>";

  // PR 榜
  const pr = M.personalRecords(runs);
  const prCard = (isNew, icon, value, label, date) =>
    '<div class="pr' + (isNew ? " new" : "") + '">' +
      (isNew ? '<span class="tag">NEW!</span>' : "") +
      '<div class="t">' + icon + "</div>" +
      '<div class="v' + (isNew ? " lime" : "") + '">' + value + "</div>" +
      '<div class="lbl" style="margin-top:2px">' + label + "</div>" +
      '<div class="d">' + date + "</div>" +
    "</div>";
  el("prBoard").innerHTML =
    prCard(pr.isNew.fastestPace, "⚡", pr.fastestPace ? M.formatPace(pr.fastestPace.pace) : "—",
      "FASTEST PACE /km",
      pr.fastestPace ? pr.fastestPace.date + " · " + pr.fastestPace.km + " km" : "no run ≥ " + M.MIN_PR_KM + " km") +
    prCard(pr.isNew.longestRun, "🥇", pr.longestRun ? pr.longestRun.km + " km" : "—",
      "LONGEST RUN", pr.longestRun ? pr.longestRun.date : "—") +
    prCard(pr.isNew.longestTime, "⏱️", pr.longestTime ? pr.longestTime.min + " min" : "—",
      "LONGEST TIME", pr.longestTime ? pr.longestTime.date : "—");

  // AVG PACE(最近 5 次加權平均)
  const ap = M.avgPace(runs);
  const deltaLine =
    ap.deltaSec == null
      ? ""
      : Math.abs(ap.deltaSec) < 1
        ? '<div style="font-size:11px;color:var(--muted);margin-top:8px">same as previous 5</div>'
        : '<div style="font-size:11px;color:var(--muted);margin-top:8px">' +
          (ap.deltaSec > 0
            ? "▲ " + Math.round(ap.deltaSec) + " sec faster"
            : "▼ " + Math.round(-ap.deltaSec) + " sec slower") +
          " than previous 5</div>";
  el("avgPace").innerHTML =
    '<div class="lbl">AVG PACE · LAST ' + ap.sampleSize + " RUN" + (ap.sampleSize === 1 ? "" : "S") + "</div>" +
    '<div class="num lime paceBig">' + M.formatPace(ap.pace) + "</div>" +
    '<div class="lbl" style="letter-spacing:.5px">MIN / KM</div>' +
    deltaLine;

  // WEEKLY DISTANCE(最近 8 週)
  const wd = M.weeklyDistance(runs, TODAY, 8);
  const maxKm = Math.max(1, ...wd.map((x) => x.km));
  el("weeklyDist").innerHTML =
    '<div style="display:flex;justify-content:space-between;align-items:baseline">' +
      '<b style="font-size:13px">WEEKLY DISTANCE</b>' +
      '<span class="lbl">THIS WEEK <span class="num lime" style="font-size:12px">' +
        wd[wd.length - 1].km + " km</span></span>" +
    "</div>" +
    '<div class="bars" style="margin-top:12px">' +
      wd.map((x) =>
        '<i class="' + (x.isCurrent ? "on" : "") + '" style="height:' + Math.max(2, (x.km / maxKm) * 100) +
        '%" title="' + x.weekStart + " · " + x.km + ' km"></i>').join("") +
    "</div>" +
    '<div class="barx">' +
      wd.map((x) => "<span>" + (x.isCurrent ? "NOW" : x.weekStart.slice(5).replace("-", "/")) + "</span>").join("") +
    "</div>";

  // ACTIVITY 熱力圖:一欄一週(週一~週日)。tab 切「過去 365 天」或某個日曆年。
  const MON = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
  const HM_YEARS = M.heatmapYears(runs, TODAY);
  const HM_COL = 17; // 13px 格子 + 4px gap,捲動定位用

  function renderActivity(view) {
    const hm = view === "recent" ? M.heatmap(runs, TODAY) : M.heatmapYear(runs, Number(view), TODAY);
    const scope = view === "recent" ? "THE PAST " + M.HEATMAP_DAYS + " DAYS" : view;

    let lastMon = -1;
    const monCells = hm.weeks.map((col, i) => {
      const first = col.find((c) => c);
      const d = new Date((first ? first.date : hm.firstDate) + "T00:00:00");
      const mo = d.getMonth();
      const show = mo !== lastMon && d.getDate() <= 7; // 該欄的第一格落在月初才標,避免月份標在月中
      if (show) lastMon = mo;
      return '<span style="grid-column:' + (i + 1) + '">' + (show ? MON[mo] : "") + "</span>";
    }).join("");

    const cells = hm.weeks.map((col) =>
      col.map((c) => c
        ? '<i class="l' + c.level + '" title="' + c.date + " · " + (c.km ? c.km + " km" : "rest") + '"></i>'
        : '<i class="empty"></i>'
      ).join("")
    ).join("");

    const tabs = ["recent"].concat(HM_YEARS).map((v) => {
      const on = String(v) === String(view);
      return '<button class="hmTab' + (on ? " on" : "") + '" data-view="' + v + '" aria-pressed="' + on + '">' +
        (v === "recent" ? "RECENT" : v) + "</button>";
    }).join("");

    const gridCols = "grid-template-columns:repeat(" + hm.weeks.length + ",13px)";

    el("activity").innerHTML =
      '<div style="display:flex;justify-content:space-between;align-items:baseline;gap:12px;flex-wrap:wrap">' +
        '<b style="font-size:13px">ACTIVITY</b>' +
        '<div class="hmTabs">' + tabs + "</div>" +
      "</div>" +
      '<div class="lbl" style="margin:6px 0 12px">' + plural(hm.totalRuns, "RUN") + " IN " + scope + "</div>" +
      '<div class="hmBody">' +
        '<div class="hmDays"><span>Mon</span><span></span><span>Wed</span><span></span><span>Fri</span><span></span><span></span></div>' +
        '<div class="hmScroll" id="hmScroll">' +
          '<div class="hmMon" style="' + gridCols + '">' + monCells + "</div>" +
          '<div class="hmGrid" id="hmGrid" style="' + gridCols + '">' + cells + "</div>" +
        "</div>" +
      "</div>" +
      '<div class="hmLegend">LESS' +
        '<i style="background:var(--hm0)"></i><i style="background:var(--hm1)"></i>' +
        '<i style="background:var(--hm2)"></i><i style="background:var(--hm3)"></i>MORE</div>';

    // 一整年放不進手機:視圖含今天就把今天那欄捲到最右;過去年份不含今天,停在最左的一月。
    const sc = el("hmScroll");
    const todayCol = hm.weeks.findIndex((col) => col.some((c) => c && c.date === TODAY));
    sc.scrollLeft = todayCol < 0 ? 0 : Math.max(0, (todayCol + 1) * HM_COL - sc.clientWidth);
  }

  renderActivity("recent");
  el("activity").addEventListener("click", (e) => {
    const tab = e.target.closest(".hmTab");
    if (tab) renderActivity(tab.dataset.view);
  });

  // 資料殘缺不靜默略過
  if (invalid.length) {
    el("dataErrors").innerHTML =
      "<b>DATA ERROR</b> — " + invalid.length + " incomplete record(s): " +
      invalid.map((v) => v.date + " (" + v.reason + ")").join(", ");
  }

  // 頭像放大檢視:點頭像開,點背景/✕/Esc 關
  const box = el("lightbox");
  const openBox = () => { box.classList.add("on"); document.body.style.overflow = "hidden"; };
  const closeBox = () => { box.classList.remove("on"); document.body.style.overflow = ""; };
  el("avatar").addEventListener("click", openBox);
  box.addEventListener("click", closeBox);   // 點圖片本身也關(cursor 是 zoom-out,符合預期)
  document.addEventListener("keydown", (e) => { if (e.key === "Escape") closeBox(); });
})();
</script>
</body>
</html>
