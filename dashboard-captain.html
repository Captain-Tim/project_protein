<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Project Protein — Dashboard</title>
<style>
  :root {
    --bg: #070708; --card: #111214; --border: #212328;
    --ink: #e9ecef; --muted: #7f858e; --grid: #2b3038;
    --accent: #e3b73f; --accent-dim: #a8842a;
    --person: #38bdf8;                                  /* 人物色:取自頭像的冰藍眼睛 */
    --c-leg: #60a5fa; --c-chest: #a78bfa; --c-cardio: #fbbf24; --c-hiit: #f87171;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--ink);
    font-family: "Segoe UI", "Microsoft JhengHei", system-ui, sans-serif; line-height: 1.5;
  }
  .wrap { max-width: 1400px; margin: 0 auto; padding: 18px 16px 60px; }

  header.hero {
    display: flex; align-items: center; gap: 14px;
    background: radial-gradient(600px 120px at 8% -30%, rgba(56, 189, 248, .32), transparent), #0d0e10;
    border: 1px solid var(--border); border-radius: 16px; padding: 14px 16px;
  }
  /* 頭像:光暈脈動(呼吸),點下去放大看原圖 */
  .avatar { width: 62px; height: 62px; border-radius: 50%; flex: 0 0 auto; object-fit: cover;
    border: 2px solid var(--person); cursor: zoom-in;
    animation: avatarPulse 2.2s ease-in-out infinite; transition: transform .15s; }
  .avatar:hover { transform: scale(1.06); }
  @keyframes avatarPulse {
    0%, 100% { box-shadow: 0 0 13px rgba(56, 189, 248, .35); }
    50%      { box-shadow: 0 0 19px rgba(56, 189, 248, .8); }
  }
  @media (prefers-reduced-motion: reduce) {
    .avatar { animation: none; box-shadow: 0 0 16px rgba(56, 189, 248, .5); }
  }

  /* 放大檢視 */
  #lightbox { position: fixed; inset: 0; z-index: 100; display: none;
    align-items: center; justify-content: center; padding: 24px;
    background: rgba(4, 4, 5, .88); backdrop-filter: blur(6px); cursor: zoom-out; }
  #lightbox.on { display: flex; }
  #lightbox img { max-width: min(90vw, 640px); max-height: 86vh; border-radius: 18px;
    border: 2px solid var(--person); box-shadow: 0 0 60px rgba(56, 189, 248, .45);
    animation: lbIn .18s ease-out; }
  @keyframes lbIn { from { opacity: 0; transform: scale(.94); } to { opacity: 1; transform: scale(1); } }
  #lightbox .close { position: absolute; top: 18px; right: 22px; font-size: 26px; line-height: 1;
    color: var(--muted); background: none; border: 0; cursor: pointer; font-family: inherit; }
  #lightbox .close:hover { color: var(--ink); }
  header.hero h1 { margin: 0; font-size: 19px; font-weight: 800; letter-spacing: .5px; }
  header.hero h1 i { color: var(--person); font-style: normal; }
  header.hero .meta { font-size: 10px; letter-spacing: 1.1px; color: var(--muted); font-weight: 600; margin-top: 3px; }
  .peer { margin-left: auto; font-size: 12px; color: var(--muted); text-decoration: none; white-space: nowrap;
    border: 1px solid var(--border); border-radius: 999px; padding: 5px 12px; }
  .peer:hover { color: var(--ink); border-color: var(--person); }

  .toolbar {
    display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap;
    position: sticky; top: 0; z-index: 20;
    background: var(--bg); padding: 14px 0 10px;
  }
  .period { font-size: 22px; color: var(--ink); font-weight: 800; }
  .period b { color: var(--accent); font-weight: 800; }
  .phint { font-size: 11px; color: var(--muted); margin-top: 3px; }
  .seg { display: inline-flex; background: var(--card); border: 1px solid var(--border); border-radius: 999px; padding: 3px; gap: 2px; }
  .seg button { border: 0; background: transparent; color: var(--muted); font-size: 12px; padding: 5px 14px; border-radius: 999px; cursor: pointer; font-family: inherit; }
  .seg button.on { background: var(--accent); color: #0a0a0a; font-weight: 700; box-shadow: 0 0 14px rgba(227, 183, 63, .35); }
  .seg button:hover:not(.on) { color: var(--ink); }

  .stats { display: flex; flex-wrap: wrap; gap: 12px; margin: 12px 0 6px; }
  .stat { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 12px 18px; min-width: 124px;
    display: flex; align-items: center; justify-content: space-between; gap: 16px; }
  .stat .n { font-size: 28px; font-weight: 800; color: var(--accent); font-family: Consolas, ui-monospace, monospace; }
  .stat .l { font-size: 15px; color: var(--ink); }

  h2 { font-size: 10px; letter-spacing: 1.1px; color: var(--muted); font-weight: 600; margin: 22px 2px 10px; text-transform: uppercase; }
  .grid { display: grid; gap: 12px; grid-template-columns: repeat(auto-fill, minmax(min(100%, 380px), 1fr)); }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 14px 16px 10px; min-width: 0; }
  .card h3 { margin: 0 0 2px; font-size: 13px; font-weight: 700; color: var(--ink); }
  .card .sub { font-size: 10px; letter-spacing: 1.1px; color: var(--muted); font-weight: 600; margin-bottom: 6px; }
  .full { grid-column: 1 / -1; }
  svg { display: block; width: 100%; height: auto; overflow: visible; }
  svg text { font-family: "Segoe UI", "Microsoft JhengHei", system-ui, sans-serif; }
  .legend { display: flex; flex-wrap: wrap; gap: 14px; font-size: 11px; color: var(--muted); margin: 8px 2px 2px; }
  .legend span { display: inline-flex; align-items: center; gap: 6px; }
  .legend label { display: inline-flex; align-items: center; gap: 6px; cursor: pointer; user-select: none; }
  .legend input { accent-color: var(--accent); cursor: pointer; margin: 0 2px 0 0; }
  .dot { width: 12px; height: 3px; border-radius: 2px; display: inline-block; }
  .dot.sq { width: 10px; height: 10px; border-radius: 3px; }
  footer { text-align: center; color: var(--muted); font-size: 11px; letter-spacing: .6px; margin-top: 40px; }
  #tip { position: fixed; z-index: 50; pointer-events: none; opacity: 0; transition: opacity .08s;
    background: #1a1c20; color: var(--ink); border: 1px solid var(--border); border-radius: 8px;
    padding: 5px 9px; font-size: 12px; white-space: nowrap; box-shadow: 0 4px 14px rgba(0,0,0,.55); }
  [data-tip] { cursor: pointer; }
  @media (max-width: 640px) {
    .wrap { padding: 12px 12px 48px; }
    header.hero { gap: 12px; padding: 12px 14px; flex-wrap: wrap; }
    .avatar { width: 52px; height: 52px; }
    header.hero h1 { font-size: 17px; }
    .peer { margin-left: auto; }
    .period { font-size: 18px; }
    .stat { min-width: 100px; padding: 10px 14px; }
    .stat .n { font-size: 22px; }
    .stat .l { font-size: 14px; }
    .seg button { padding: 5px 11px; font-size: 12px; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header class="hero">
    <img class="avatar" id="avatar" src="profile/captain.jpg" alt="Captain" title="Tap to view" />
    <div>
      <h1>CAPTAIN <i>·</i> TIM</h1>
      <div class="meta" id="meta">Loading…</div>
    </div>
    <a class="peer" href="dashboard-monkey.html">Monkey ›</a>
  </header>

  <div class="toolbar">
    <div>
      <div class="period" id="periodLabel"></div>
      <div class="phint" id="periodHint"></div>
    </div>
    <div class="seg" id="granSeg">
      <button data-g="week">Week</button>
      <button data-g="month">Month</button>
      <button data-g="quarter">Quarter</button>
      <button data-g="year">Year</button>
      <button data-g="all">All</button>
    </div>
  </div>
  <div class="stats" id="stats"></div>

  <h2>Trends</h2>
  <div class="grid" id="exerciseGrid"></div>

  <!-- Cardio 已併入上方 Weight Progression 九宮格 -->

  <h2>Frequency &amp; Split</h2>
  <div class="grid">
    <div class="card full">
      <h3>Training Frequency</h3>
      <div class="sub" id="freqSub"></div>
      <div id="freqChart"></div>
      <div class="legend" id="freqLegend">
        <label><input type="checkbox" data-t="Leg/Shoulder Day" checked style="accent-color:var(--c-leg)">Leg/Shoulder</label>
        <label><input type="checkbox" data-t="Chest/Back Day" checked style="accent-color:var(--c-chest)">Chest/Back</label>
        <label><input type="checkbox" data-t="Cardio" checked style="accent-color:var(--c-cardio)">Cardio</label>
      </div>
    </div>
  </div>

  <footer id="footer"></footer>
</div>

<div id="lightbox">
  <button class="close" aria-label="Close">✕</button>
  <img src="profile/captain.jpg" alt="Captain" />
</div>

<div id="tip"></div>

  }

  function stackedBars(periods, series, keys, colors, yUnit, W, monthly, xYear, firstDate) {
    const n = periods.length; W = W || Math.max(360, n * 32 + 70); const H = 210, P = { l: 40, r: 14, t: 14, b: 30 };
    const s = svg(W, H);
    if (!n) return s;
    const totals = periods.map((p, i) => keys.reduce((a, k) => a + (series[k][i] || 0), 0));
    let yMax = Math.max(1, ...totals);
    const step = Math.max(1, Math.ceil(yMax / 4));
    yMax = step * Math.ceil(yMax / step);
    const plotH = H - P.t - P.b;
    const Y = (v) => H - P.b - (v / yMax) * plotH;
    for (let v = 0; v <= yMax; v += step) {
      s.appendChild(el("line", { x1: P.l, y1: Y(v), x2: W - P.r, y2: Y(v), stroke: "var(--grid)", "stroke-width": 1 }));
      s.appendChild(el("text", { x: P.l - 6, y: Y(v) + 3, "text-anchor": "end", "font-size": 9, fill: "var(--muted)" }, "" + v));
    }
    const slot = (W - P.l - P.r) / n, w = Math.min(slot * 0.2, 10), every = Math.max(1, Math.ceil(26 / slot));
    periods.forEach((p, i) => {
      let acc = 0; const x = P.l + i * slot + (slot - w) / 2;
      keys.forEach((k, ki) => {
        const v = series[k][i] || 0; if (v <= 0) return;
        const yTop = Y(acc + v), h = Math.max(2, (Y(acc) - yTop) - 1.5);
        const r = el("rect", { x, y: yTop, width: w, height: h, rx: w / 2, fill: colors[ki] });
        r.setAttribute("data-tip", p.label + " · " + k + "：" + v + (yUnit || ""));
        s.appendChild(r); acc += v;
      });
      if (!monthly && i % every === 0) s.appendChild(el("text", { x: x + w / 2, y: H - 8, "text-anchor": "middle", "font-size": 9, fill: "var(--muted)" }, p.label));
    });
    if (monthly) xAxisTicks(periods, firstDate, xYear).forEach((t) => drawXLabel(s, P.l + t.i * slot + slot / 2, H - 16, t.text, t.sub));
    return s;
  }

  function hbars(rows) {
    const W = 320, rowH = 30, H = rows.length * rowH + 10, s = svg(W, H);
    const max = Math.max(1, ...rows.map((r) => r.value));
    rows.forEach((r, i) => { const y = i * rowH + 6; s.appendChild(el("text", { x: 0, y: y + 13, "font-size": 11, fill: "var(--ink)" }, r.label)); s.appendChild(el("rect", { x: 96, y: y + 3, width: (W - 130) * (r.value / max), height: 14, fill: r.color, rx: 3 })); s.appendChild(el("text", { x: W - 4, y: y + 14, "text-anchor": "end", "font-size": 11, fill: "var(--muted)" }, "" + r.value)); });
    return s;
  }

  function arcPath(cx, cy, rO, rI, a1, a2) {
    const pt = (r, a) => [cx + r * Math.cos(a), cy + r * Math.sin(a)];
    const [x1o, y1o] = pt(rO, a1), [x2o, y2o] = pt(rO, a2), [x1i, y1i] = pt(rI, a2), [x2i, y2i] = pt(rI, a1);
    const large = a2 - a1 > Math.PI ? 1 : 0;
    return `M ${x1o} ${y1o} A ${rO} ${rO} 0 ${large} 1 ${x2o} ${y2o} L ${x1i} ${y1i} A ${rI} ${rI} 0 ${large} 0 ${x2i} ${y2i} Z`;
  }
  function donut(rows, size) {
    size = size || 110; const cx = size / 2, cy = size / 2, rO = size / 2 - 3, rI = (size / 2 - 3) * 0.56, s = svg(size, size);
    s.style.width = size + "px"; s.style.height = size + "px"; s.style.flexShrink = "0";
    const total = rows.reduce((a, r) => a + r.value, 0);
    const nz = rows.filter((r) => r.value > 0);
    if (total === 0) {
      s.appendChild(el("circle", { cx, cy, r: (rO + rI) / 2, fill: "none", stroke: "var(--grid)", "stroke-width": rO - rI }));
    } else if (nz.length === 1) {
      const o = el("circle", { cx, cy, r: rO, fill: nz[0].color }); o.setAttribute("data-tip", nz[0].label + "：" + nz[0].value); s.appendChild(o);
      s.appendChild(el("circle", { cx, cy, r: rI, fill: "var(--card)" }));
    } else {
      let ang = -Math.PI / 2;
      nz.forEach((row) => { const a2 = ang + (row.value / total) * 2 * Math.PI; const pa = el("path", { d: arcPath(cx, cy, rO, rI, ang, a2), fill: row.color }); pa.setAttribute("data-tip", row.label + "：" + row.value); s.appendChild(pa); ang = a2; });
    }
    s.appendChild(el("text", { x: cx, y: cy + size * 0.1, "text-anchor": "middle", "font-size": size * 0.28, "font-weight": 700, fill: "var(--ink)" }, "" + total));
    return s;
  }

  let first, last, curGran = "week", chartGranCur = "week", winStart;
  const exMap = new Map();
  const freqShow = { "Leg/Shoulder Day": true, "Chest/Back Day": true, "Cardio": true };

  function init() {
    if (!sessions.length) { document.getElementById("meta").textContent = "No data."; return false; }
    first = parseDate(sessions[0].date); last = parseDate(sessions[sessions.length - 1].date);
    document.getElementById("meta").textContent = "Fit body, sharp mind.";
    sessions.forEach((s) => s.strength.forEach((ex) => {
      const w = Math.max(...ex.sets.map((st) => st.weight).filter((v) => v != null));
      if (!isFinite(w)) return;
      if (!exMap.has(ex.exercise)) exMap.set(ex.exercise, { unit: ex.unit || "", byDate: [] });
      exMap.get(ex.exercise).byDate.push({ d: parseDate(s.date), w });
    }));
    document.getElementById("footer").textContent =
      `${sessions.length} sessions · ${sessions[0].date} → ${sessions[sessions.length - 1].date}` +
      (D.generated_at ? ` · updated ${D.generated_at.slice(0, 10)}` : "");
    return true;
  }

  function autoFine(first, last) {
    const weeks = (last - first) / (7 * 86400000);
    if (weeks <= 80) return "week";
    const months = (last.getFullYear() - first.getFullYear()) * 12 + (last.getMonth() - first.getMonth());
    return months <= 60 ? "month" : "quarter";
  }

  function renderFreq() {
    const gran = chartGranCur;
    const periods = enumPeriods(winStart, last, gran);
    const idx = {}; periods.forEach((p, i) => (idx[p.key] = i));
    const allKeys = ["Leg/Shoulder Day", "Chest/Back Day", "Cardio"];
    const colorMap = { "Leg/Shoulder Day": "var(--c-leg)", "Chest/Back Day": "var(--c-chest)", "Cardio": "var(--c-cardio)" };
    const keys = allKeys.filter((k) => freqShow[k]);
    const fser = {}; allKeys.forEach((k) => (fser[k] = periods.map(() => 0)));
    sessions.forEach((s) => { const i = idx[bucketKey(parseDate(s.date), gran)]; if (i != null && fser[s.type] != null) fser[s.type][i]++; });
    const freq = document.getElementById("freqChart"); freq.innerHTML = "";
    freq.appendChild(stackedBars(periods, fser, keys, keys.map((k) => colorMap[k]), " sessions", freq.clientWidth));
    document.getElementById("freqSub").textContent = `Each bar = 1 ${{ week: "week", month: "month", quarter: "quarter", year: "year" }[gran]}`;
  }

  function render(gran) {
    curGran = gran;
    const isAll = gran === "all";
    const chartGran = isAll ? autoFine(first, last) : gran;   // All 圖表用安全粗粒度,不會爆
    chartGranCur = chartGran;
    winStart = gran === "week" ? new Date(Math.max(first.getTime(), new Date(last.getFullYear(), last.getMonth() - 6, last.getDate()).getTime()))
      : (gran === "month" || gran === "quarter") ? new Date(Math.max(first.getTime(), new Date(last.getFullYear() - 1, last.getMonth(), last.getDate()).getTime()))
      : first;
    const periods = enumPeriods(winStart, last, chartGran);
    const idx = {}; periods.forEach((p, i) => (idx[p.key] = i));
    const smallGran = chartGran, smallPeriods = periods, smallIdx = idx;
    const gName = { week: "week", month: "month", quarter: "quarter", year: "year", day: "day" }[chartGran];
    const cur = periods[periods.length - 1];

    // 當期統計卡(All 統計全部)
    const inCur = isAll ? sessions.slice() : sessions.filter((s) => bucketKey(parseDate(s.date), chartGran) === cur.key);
    const strN = inCur.filter((s) => s.type !== "Cardio").length;
    const carN = inCur.filter((s) => s.type === "Cardio").length;
    const carMin = inCur.reduce((a, s) => a + s.cardio.reduce((b, c) => b + (c.duration_min || 0), 0), 0);
    const statsEl = document.getElementById("stats"); statsEl.innerHTML = "";
    const numCol = document.createElement("div"); numCol.style.cssText = "display:flex;flex-direction:column;gap:10px;flex:1 1 auto";
    [[inCur.length, "Sessions"], [strN, "Strength"], [carN, "Cardio"], [carMin, "Cardio min"]].forEach(([n, l]) => {
      const d = document.createElement("div"); d.className = "stat";
      d.innerHTML = `<div class="l">${l}</div><div class="n">${n}</div>`; numCol.appendChild(d);
    });
    statsEl.appendChild(numCol);
    const tc = { "Leg/Shoulder Day": 0, "Chest/Back Day": 0, "Cardio": 0 };
    inCur.forEach((s) => { if (tc[s.type] != null) tc[s.type]++; });
    const mob = window.innerWidth < 640;
    const dcard = document.createElement("div"); dcard.className = "stat";
    dcard.style.cssText = `display:flex;align-items:center;justify-content:flex-start;gap:${mob ? 20 : 40}px;flex:1 1 auto`;
    dcard.appendChild(donut([
      { label: "Leg/Shoulder", value: tc["Leg/Shoulder Day"], color: "var(--c-leg)" },
      { label: "Chest/Back", value: tc["Chest/Back Day"], color: "var(--c-chest)" },
      { label: "Cardio", value: tc["Cardio"], color: "var(--c-cardio)" },
    ], mob ? 112 : 150));
    const dleg = document.createElement("div"); dleg.style.cssText = `display:flex;flex-direction:column;gap:${mob ? 8 : 11}px;font-size:${mob ? 13 : 17}px;font-weight:600;color:var(--ink)`;
    dleg.innerHTML = [["Leg/Shoulder", tc["Leg/Shoulder Day"], "--c-leg"], ["Chest/Back", tc["Chest/Back Day"], "--c-chest"], ["Cardio", tc["Cardio"], "--c-cardio"]]
      .map(([l, v, c]) => `<span style="display:inline-flex;align-items:center;gap:10px"><i style="width:12px;height:12px;border-radius:3px;background:var(${c});display:inline-block"></i>${l} · ${v}</span>`).join("");
    dcard.appendChild(dleg); statsEl.appendChild(dcard);
    const weeksAll = Math.max(1, Math.round((last - first) / (7 * 86400000)) + 1);
    const wk = gran === "all" ? weeksAll : { week: 1, month: 4, quarter: 13, year: 52 }[gran];
    const c = inCur.length, thumbsAt = 2 * wk, fireAt = 5 * wk;
    const badge = c >= fireAt ? " 🔥" : c >= thumbsAt ? " 👍" : " 😴";
    document.getElementById("periodLabel").innerHTML = `<b>${periodHuman(gran, cur.start)}</b> Stats${badge}`;
    document.getElementById("periodHint").textContent = isAll ? "" :
      c >= fireAt ? "Top tier reached 🔥 — keep it up!" :
      c >= thumbsAt ? `${fireAt - c} more to reach 🔥` :
      `${thumbsAt - c} more to reach 👍`;

    // 動作趨勢
    const grid = document.getElementById("exerciseGrid"); grid.innerHTML = "";
    [...exMap.entries()].sort((a, b) => b[1].byDate.length - a[1].byDate.length).forEach(([name, info], k) => {
      const vals = smallPeriods.map(() => null), vdates = smallPeriods.map(() => null);
      info.byDate.forEach((r) => { const i = smallIdx[bucketKey(r.d, smallGran)]; if (i == null) return; if (vals[i] == null || r.w > vals[i]) { vals[i] = r.w; vdates[i] = r.d; } });
      const color = palette[k % palette.length];
      const card = document.createElement("div"); card.className = "card";
      card.innerHTML = `<h3 style="color:${color}">${name} (${info.unit}.)</h3>`;
      card.appendChild(lineChart(smallPeriods, vals, info.unit, color, { skipZero: true, xYear: isAll, firstDate: (info.byDate.find((r) => r.d >= winStart) || {}).d || null, tipDates: smallGran === "week" ? vdates : null }));
      grid.appendChild(card);
    });

    // 頻率(類型可勾選)
    renderFreq();

    // 有氧:小卡(堆疊柱,跟著時間尺度)
    const cser = { "Zone 2": smallPeriods.map(() => 0), "HIIT": smallPeriods.map(() => 0) };
    sessions.forEach((s) => { const i = smallIdx[bucketKey(parseDate(s.date), smallGran)]; if (i == null) return; s.cardio.forEach((c) => { cser[c.exercise === "HIIT" ? "HIIT" : "Zone 2"][i] += c.duration_min || 0; }); });
    const ccf = sessions.find((s) => s.cardio && s.cardio.length && parseDate(s.date) >= winStart);
    const ccard = document.createElement("div"); ccard.className = "card";
    ccard.innerHTML = `<h3 style="color:var(--c-cardio)">Cardio (min)</h3>`;
    ccard.appendChild(stackedBars(smallPeriods, cser, ["Zone 2", "HIIT"], ["var(--c-cardio)", "var(--c-hiit)"], " min", 320, true, isAll, ccf ? parseDate(ccf.date) : null));
    const clg = document.createElement("div"); clg.className = "legend"; clg.style.marginTop = "2px";
    clg.innerHTML = `<span><i class="dot" style="background:var(--c-cardio)"></i>Zone 2</span><span><i class="dot" style="background:var(--c-hiit)"></i>HIIT</span>`;
    ccard.appendChild(clg); grid.appendChild(ccard);

    document.querySelectorAll("#granSeg button").forEach((b) => b.classList.toggle("on", b.dataset.g === gran));
  }

  if (init()) {
    document.getElementById("granSeg").addEventListener("click", (e) => { const b = e.target.closest("button"); if (b) render(b.dataset.g); });
    document.getElementById("freqLegend").addEventListener("change", (e) => { const t = e.target.dataset.t; if (t) { freqShow[t] = e.target.checked; renderFreq(); } });
    render("week");
  }

  // 即時 hover 提示(取代原生 <title> 的延遲)
  const tip = document.getElementById("tip");
  if (tip) {
    document.addEventListener("mouseover", (e) => { const t = e.target.getAttribute && e.target.getAttribute("data-tip"); if (t) { tip.textContent = t; tip.style.opacity = "1"; } });
    document.addEventListener("mousemove", (e) => { if (tip.style.opacity === "1") { tip.style.left = Math.min(e.clientX + 12, window.innerWidth - tip.offsetWidth - 6) + "px"; tip.style.top = (e.clientY + 14) + "px"; } });
    document.addEventListener("mouseout", (e) => { if (e.target.getAttribute && e.target.getAttribute("data-tip")) tip.style.opacity = "0"; });
  }

  // 頭像放大檢視:點頭像開,點背景/✕/Esc 關
  const box = document.getElementById("lightbox");
  const closeBox = () => { box.classList.remove("on"); document.body.style.overflow = ""; };
  document.getElementById("avatar").addEventListener("click", () => {
    box.classList.add("on"); document.body.style.overflow = "hidden";
  });
  box.addEventListener("click", closeBox);
  document.addEventListener("keydown", (e) => { if (e.key === "Escape") closeBox(); });
})();
</script>
</body>
</html>
