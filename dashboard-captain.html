<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Captain — Tim</title>
<style>
  @property --ang { syntax: "<angle>"; initial-value: 0deg; inherits: false; }
  :root {
    --bg: #070708; --card: #111214; --border: #212328;
    --ink: #e9ecef; --muted: #7f858e; --grid: #2b3038;
    --accent: #e3b73f; --accent-dim: #a8842a;
    --person: #38bdf8;                                  /* 人物色:取自頭像的冰藍眼睛 */
    --streak-bg: #1a1408; --streak-border: #4a3a12;
    --pos: #34d399; --neg: #f87171;                     /* 漲跌:▲ 進步=綠、▼ 退步=紅 */
    --c-leg: #60a5fa; --c-shoulder: #34d399; --c-chest: #a78bfa; --c-back: #f472b6; --c-cardio: #fbbf24;
    --hm0: #17191c; --hm1: #1f5a78; --hm2: #2ea8dd; --hm3: #5cd0ff;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--ink);
    font-family: "Segoe UI", "Microsoft JhengHei", system-ui, sans-serif; line-height: 1.5;
  }
  .wrap { max-width: 1100px; margin: 0 auto; padding: 18px 16px 60px; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 14px 16px; min-width: 0; }
  .row { display: flex; gap: 12px; }
  .lbl { font-size: 10px; letter-spacing: 1.1px; color: var(--muted); font-weight: 600; }
  .num { font-family: Consolas, ui-monospace, monospace; font-weight: 700; }
  .accent { color: var(--tab-c, var(--accent)); }
  /* 趨勢差值:箭頭已代表「進步/退步」(配速 ▲=更快、重量 ▲=更重),故 ▲ 綠 / ▼ 紅 */
  .delta { font-size: 11px; margin-top: 8px; }
  .delta.up { color: var(--pos); }
  .delta.down { color: var(--neg); }
  .delta.flat { color: var(--muted); }

  header.hero {
    display: flex; align-items: center; gap: 14px;
    background: radial-gradient(600px 120px at 8% -30%, rgba(56, 189, 248, .32), transparent), #0d0e10;
    border: 1px solid var(--border); border-radius: 16px; padding: 14px 16px;
  }
  /* 頭像:光暈脈動(呼吸),點下去放大看原圖 */
  .avatar { width: 62px; height: 62px; border-radius: 50%; flex: 0 0 auto; object-fit: cover;
    border: 2px solid var(--person); cursor: zoom-in;
    animation: avatarPulse 2.2s ease-in-out infinite; transition: transform .15s; }
  .avatar:hover { transform: scale(1.06); }
  @keyframes avatarPulse {
    0%, 100% { box-shadow: 0 0 13px rgba(56, 189, 248, .35); }
    50%      { box-shadow: 0 0 19px rgba(56, 189, 248, .8); }
  }
  @media (prefers-reduced-motion: reduce) {
    .avatar { animation: none; box-shadow: 0 0 16px rgba(56, 189, 248, .5); }
  }

  /* 放大檢視 */
  #lightbox { position: fixed; inset: 0; z-index: 100; display: none;
    align-items: center; justify-content: center; padding: 24px;
    background: rgba(4, 4, 5, .88); backdrop-filter: blur(6px); cursor: zoom-out; }
  #lightbox.on { display: flex; }
  #lightbox img { max-width: min(90vw, 640px); max-height: 86vh; border-radius: 18px;
    border: 2px solid var(--person); box-shadow: 0 0 60px rgba(56, 189, 248, .45);
    animation: lbIn .18s ease-out; }
  @keyframes lbIn { from { opacity: 0; transform: scale(.94); } to { opacity: 1; transform: scale(1); } }
  #lightbox .close { position: absolute; top: 18px; right: 22px; font-size: 26px; line-height: 1;
    color: var(--muted); background: none; border: 0; cursor: pointer; font-family: inherit; }
  #lightbox .close:hover { color: var(--ink); }

  /* 熱力圖某日詳情小卡:點有紀錄的格子跳出,後方頁面模糊 */
  #dayModal { position: fixed; inset: 0; z-index: 110; display: none;
    align-items: center; justify-content: center; padding: 20px;
    background: rgba(4, 4, 5, .72); backdrop-filter: blur(7px); -webkit-backdrop-filter: blur(7px); }
  #dayModal.on { display: flex; }
  #dayModal .dc { position: relative; width: min(92vw, 430px); max-height: 84vh; overflow-y: auto;
    background: var(--card); border: 1px solid var(--border); border-radius: 18px;
    padding: 20px 20px 22px; box-shadow: 0 24px 64px rgba(0, 0, 0, .6); animation: lbIn .18s ease-out; }
  #dayModal .dc .close { position: absolute; top: 12px; right: 14px; font-size: 20px; line-height: 1;
    color: var(--muted); background: none; border: 0; cursor: pointer; font-family: inherit; }
  #dayModal .dc .close:hover { color: var(--ink); }
  .dcDate { font-family: Consolas, ui-monospace, monospace; font-weight: 800; font-size: 21px; letter-spacing: .5px; }
  .dcWk { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .dcTypes { display: flex; flex-wrap: wrap; gap: 6px; margin: 12px 0 2px; }
  .dcType { font-size: 10px; font-weight: 700; letter-spacing: .6px; padding: 3px 9px; border-radius: 99px;
    color: var(--accent); border: 1px solid var(--accent-dim); background: rgba(255, 255, 255, .02); }
  .dcSec { margin-top: 15px; }
  .dcSecT { font-size: 10px; letter-spacing: 1.1px; color: var(--ink); font-weight: 700; margin-bottom: 6px; }
  .dcEx { padding: 9px 0; border-top: 1px solid var(--border); }
  .dcEx:first-of-type { border-top: 0; }
  .dcExName { font-size: 13px; font-weight: 700; }
  .dcSets { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 6px; }
  .dcSet { font-family: Consolas, ui-monospace, monospace; font-size: 11px; color: var(--ink);
    padding: 2px 7px; border-radius: 6px; background: rgba(255, 255, 255, .04); border: 1px solid var(--border); }
  .dcMeta { display: flex; flex-wrap: wrap; gap: 16px; margin-top: 6px; }
  .dcMeta > div { display: flex; align-items: baseline; gap: 4px; }
  .dcMeta b { font-family: Consolas, ui-monospace, monospace; color: var(--accent); font-weight: 800; font-size: 15px; }
  .dcMeta span { color: var(--muted); font-size: 10px; letter-spacing: .5px; }
  .dcNote { font-size: 11px; color: var(--muted); margin-top: 6px; line-height: 1.55; white-space: pre-wrap; }
  .dcNoteMain { font-size: 12px; color: var(--ink); margin-top: 6px; line-height: 1.6; white-space: pre-wrap; }
  .hmGrid i[data-date] { cursor: pointer; }
  .hmGrid i[data-date]:hover { outline: 1.5px solid var(--hm3); outline-offset: 1px; }

  header.hero h1 { margin: 0; font-size: 19px; font-weight: 800; letter-spacing: .5px; }
  header.hero h1 i { color: var(--person); font-style: normal; }
  .peer { font-size: 12px; color: var(--muted); text-decoration: none; white-space: nowrap;
    border: 1px solid var(--border); border-radius: 999px; padding: 5px 12px; }
  .peer:hover { color: var(--ink); border-color: var(--person); }
  .streak { margin-left: auto; display: flex; align-items: center; gap: 8px;
    background: var(--streak-bg); border: 1px solid var(--streak-border); border-radius: 999px; padding: 7px 14px; }
  .streak .n { font-size: 20px; font-weight: 800; color: var(--accent); font-family: Consolas, monospace; }

  h2.sec { font-size: 10px; letter-spacing: 1.1px; color: var(--muted); font-weight: 600; margin: 18px 2px 8px; }

  /* Weekly Quest:三部位圓環,二元 0%/100% */
  .ring { width: 88px; height: 88px; border-radius: 50%; flex: 0 0 auto;
    display: flex; align-items: center; justify-content: center; }
  .ring.done { box-shadow: 0 0 18px rgba(227, 183, 63, .45); }
  .ring > div { width: 68px; height: 68px; border-radius: 50%; background: var(--card);
    display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .ring .v { font-size: 18px; font-weight: 800; font-family: Consolas, monospace; }
  .qwrap { justify-content: center; flex-wrap: wrap; }
  .qcol { display: flex; flex-direction: column; align-items: center; gap: 8px; flex: 1 1 0; min-width: 90px; text-align: center; }
  .xp { height: 9px; border-radius: 999px; background: #1e2126; overflow: hidden; }
  .xp > i { display: block; height: 100%; border-radius: 999px;
    background: linear-gradient(90deg, var(--accent-dim), var(--accent)); box-shadow: 0 0 10px rgba(227, 183, 63, .6); }

  /* 兩層 tab(部位 → 動作)與熱力圖年份 tab 共用同一套按鈕樣式 */
  .tabRow { display: flex; flex-wrap: wrap; gap: 6px; }
  .tabBtn { font: inherit; font-size: 11px; font-weight: 700; letter-spacing: .4px; cursor: pointer;
    padding: 6px 14px; border-radius: 99px; border: 1px solid var(--border); background: transparent;
    color: var(--muted); transition: color .15s, border-color .15s, box-shadow .15s; }
  /* hover 用該 tab 自己的色,不要用全站金色;選中態再靠 2px 邊框 + 彩色文字 + 光暈區分 */
  .tabBtn:hover { color: var(--ink); border-color: var(--tab-c, var(--accent)); }
  .tabBtn.on { color: var(--tab-c, var(--accent)); border-color: var(--tab-c, var(--accent));
    border-width: 2px; padding: 5px 13px; box-shadow: 0 0 12px var(--tab-glow, rgba(227, 183, 63, .25)); }

  .pr { flex: 1 1 0; min-width: 0; text-align: center; padding: 16px 10px; background: var(--card);
    border: 1px solid var(--border); border-radius: 16px; position: relative; }
  .pr.new { border-color: var(--tab-c, var(--accent)); box-shadow: 0 0 18px var(--tab-glow, rgba(227, 183, 63, .28)); }
  /* NEW 紀錄卡:一段光弧繞邊框流動(漸層流動邊框) */
  .pr.new::before { content: ""; position: absolute; inset: 0; border-radius: inherit; padding: 1px;
    pointer-events: none;
    background: conic-gradient(from var(--ang), transparent 0 55%, var(--tab-c, var(--accent)) 72%,
      #fff 80%, var(--tab-c, var(--accent)) 88%, transparent 100%);
    -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
    -webkit-mask-composite: xor; mask-composite: exclude;
    filter: drop-shadow(0 0 5px var(--tab-c, var(--accent)))
            drop-shadow(0 0 14px var(--tab-glow, rgba(227, 183, 63, .28)));
    animation: flowSpin 5.1s linear infinite; }
  @keyframes flowSpin { to { --ang: 360deg; } }
  @media (prefers-reduced-motion: reduce) { .pr.new::before { animation: none; } }
  .pr .t { font-size: 26px; line-height: 1; }
  .pr .v { font-size: 23px; font-weight: 800; margin-top: 6px; font-family: Consolas, monospace; }
  .pr .d { font-size: 10px; color: var(--muted); margin-top: 3px; }
  .pr .tag { position: absolute; top: -8px; right: 10px; background: var(--tab-c, var(--accent)); color: #0a0a0a;
    font-size: 9px; font-weight: 800; padding: 2px 7px; border-radius: 999px; letter-spacing: .5px; }

  /* 柱狀圖:柱體不填滿整格(留白,避免糊成色塊),空白週留淡軌道當位置參考 */
  .bars { display: flex; align-items: flex-end; gap: 8px; height: 88px; --bw: 22px;
    border-bottom: 1px solid var(--border); }
  .bars .slot { position: relative; flex: 1 1 0; min-width: 0; height: 100%;
    display: flex; align-items: flex-end; justify-content: center; }
  .bars .slot::before { content: ""; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
    width: var(--bw); height: 100%; border-radius: 4px 4px 0 0; background: rgba(255, 255, 255, .035); }
  .bars i { position: relative; width: var(--bw); max-width: 100%; border-radius: 4px 4px 0 0;
    display: block; min-height: 2px; background: transparent; }
  .bars i.on { background: linear-gradient(180deg, var(--tab-c, var(--accent)), var(--accent-dim)); }
  .bars i.on.cur { box-shadow: 0 0 9px var(--tab-glow, rgba(227, 183, 63, .28)); }
  .barx { display: flex; gap: 8px; font-size: 9px; color: var(--muted); margin-top: 6px; }
  .barx span { flex: 1 1 0; min-width: 0; text-align: center; }
  .paceBig { font-size: 40px; margin: 8px 0 2px; }

  svg { display: block; width: 100%; height: auto; overflow: visible; }
  svg text { font-family: "Segoe UI", "Microsoft JhengHei", system-ui, sans-serif; }
  #tip { position: fixed; z-index: 50; pointer-events: none; opacity: 0; transition: opacity .08s;
    background: #1a1c20; color: var(--ink); border: 1px solid var(--border); border-radius: 8px;
    padding: 5px 9px; font-size: 12px; white-space: nowrap; box-shadow: 0 4px 14px rgba(0,0,0,.55); }
  [data-tip] { cursor: pointer; }

  /* 熱力圖:一年 53 欄放不進手機,自己在容器內橫向捲動 */
  /* 捲軸跟著熱力圖的人物色(--hm ramp 取自頭像冰藍),不要用全站的金色 accent */
  .hmScroll { overflow-x: auto; padding-bottom: 10px; flex: 1 1 auto; min-width: 0;
    scrollbar-width: thin; scrollbar-color: var(--hm3) #15171a; }
  .hmScroll::-webkit-scrollbar { height: 7px; }
  .hmScroll::-webkit-scrollbar-track { background: #15171a; border-radius: 99px; }
  .hmScroll::-webkit-scrollbar-thumb { background: linear-gradient(90deg, var(--hm1), var(--hm3));
    border-radius: 99px; box-shadow: 0 0 7px rgba(92, 208, 255, .5); }
  .hmBody { display: flex; gap: 6px; align-items: flex-start; }
  .hmDays { display: grid; grid-template-rows: repeat(7, 13px); gap: 4px; font-size: 9px; color: var(--muted);
    flex: 0 0 auto; margin-top: 19px; }
  .hmDays span { display: flex; align-items: center; height: 13px; }
  .hmGrid { display: grid; grid-auto-flow: column; grid-template-rows: repeat(7, 13px); gap: 4px; }
  .hmGrid i { width: 13px; height: 13px; border-radius: 3px; display: block; background: var(--hm0); }
  .hmGrid i.l1 { background: var(--hm1); }
  .hmGrid i.l2 { background: var(--hm2); }
  .hmGrid i.l3 { background: var(--hm3); box-shadow: 0 0 7px rgba(92, 208, 255, .5); }
  .hmGrid i.empty { background: transparent; }
  .hmMon { display: grid; grid-auto-flow: column; gap: 4px; font-size: 9px; color: var(--muted); margin-bottom: 5px; }
  .hmLegend { display: flex; align-items: center; gap: 6px; font-size: 9px; color: var(--muted);
    margin-top: 12px; justify-content: flex-end; }
  .hmLegend i { width: 11px; height: 11px; border-radius: 3px; display: inline-block; }

  @media (max-width: 640px) {
    .wrap { padding: 12px 12px 48px; }
    header.hero { gap: 12px; padding: 12px 14px; flex-wrap: wrap; }
    .avatar { width: 52px; height: 52px; }
    header.hero h1 { font-size: 17px; }
    .streak { margin-left: 0; width: 100%; justify-content: center; margin-top: 10px; }
    .peer { margin-left: auto; }
    .row { flex-direction: column; }
    .qwrap { flex-direction: row !important; flex-wrap: wrap; }
    .ring { width: 76px; height: 76px; }
    .ring > div { width: 58px; height: 58px; }
    #prBoard { flex-direction: row !important; gap: 8px; }
    .pr { padding: 12px 4px; }
    .pr .t { font-size: 20px; }
    .pr .v { font-size: 17px; }
    .pr .d { font-size: 9px; }
    .pr .tag { right: 4px; }
    #avgPace { order: -1; }
    .paceBig { font-size: 38px; }
    .bars { height: 74px; gap: 5px; --bw: 16px; }
    .barx { gap: 5px; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header class="hero">
    <img class="avatar" id="avatar" src="profile/captain-avatar.jpg" alt="Captain" title="Tap to view" />
    <div>
      <h1>CAPTAIN <i>·</i> TIM</h1>
      <div class="lbl" id="totals" style="margin-top:3px"></div>
    </div>
    <div class="streak">
      <span style="font-size:20px">🔥</span>
      <div class="n" id="streakVal">0</div>
      <div class="lbl" style="line-height:1.2">WEEK<br />STREAK</div>
    </div>
    <a class="peer" href="dashboard-monkey.html">Monkey ›</a>
  </header>

  <div class="card" id="quest" style="margin-top:12px"></div>

  <h2 class="sec">TRAINING LOG</h2>
  <div class="tabRow" id="tabs1"></div>
  <div class="tabRow" id="tabs2" style="margin-top:8px"></div>

  <h2 class="sec" id="prHeading"></h2>
  <div class="row" id="prBoard"></div>

  <div class="row" id="trendRow" style="margin-top:12px"></div>

  <div class="card" id="activity" style="margin-top:16px"></div>
</div>

<div id="lightbox">
  <button class="close" aria-label="Close">✕</button>
  <img src="profile/captain.jpg" alt="Captain" />
</div>

<div id="tip"></div>

<div id="dayModal"></div>

    const mm = Math.floor(p), ss = Math.round((p - mm) * 60);
    return ss === 60 ? (mm + 1) + ":00" : mm + ":" + String(ss).padStart(2, "0");
  }

  // Catmull-Rom → Bezier 平滑曲線,取代直線段折線
  function smoothPath(pos) {
    let d = "M " + pos[0][0] + " " + pos[0][1];
    for (let i = 0; i < pos.length - 1; i++) {
      const p0 = pos[i - 1] || pos[i], p1 = pos[i], p2 = pos[i + 1], p3 = pos[i + 2] || p2;
      const c1x = p1[0] + (p2[0] - p0[0]) / 6, c1y = p1[1] + (p2[1] - p0[1]) / 6;
      const c2x = p2[0] - (p3[0] - p1[0]) / 6, c2y = p2[1] - (p3[1] - p1[1]) / 6;
      d += " C " + c1x + " " + c1y + " " + c2x + " " + c2y + " " + p2[0] + " " + p2[1];
    }
    return d;
  }

  let chartSeq = 0;

  // 單一動作的重量趨勢:直接以「這個動作出現過的那次訓練」為 X 軸,不分期
  function lineChart(points, color) {
    const W = 320, H = 128, P = { l: 38, r: 12, t: 14, b: 24 };
    const s = svg(W, H);
    if (!points.length) return s;
    const n = points.length, ys = points.map((p) => p.y);
    let yMin = Math.min(...ys), yMax = Math.max(...ys);
    const pad = (yMax - yMin) * 0.15 || Math.max(1, yMax * 0.1);
    yMin = Math.max(0, yMin - pad); yMax += pad;
    const X = (i) => P.l + (n <= 1 ? 0.5 : i / (n - 1)) * (W - P.l - P.r);
    const Y = (y) => H - P.b - (yMax === yMin ? 0.5 : (y - yMin) / (yMax - yMin)) * (H - P.t - P.b);
    const baseY = H - P.b;
    [yMin, (yMin + yMax) / 2, yMax].forEach((v) => {
      s.appendChild(el("line", { x1: P.l, y1: Y(v), x2: W - P.r, y2: Y(v), stroke: "var(--grid)", "stroke-width": 1 }));
      s.appendChild(el("text", { x: P.l - 5, y: Y(v) + 3, "text-anchor": "end", "font-size": 9, fill: "var(--muted)" }, "" + round2(v)));
    });
    const every = Math.max(1, Math.ceil(n / 8));
    points.forEach((p, i) => { if (i % every === 0 || i === n - 1) s.appendChild(el("text", { x: X(i), y: H - 10, "text-anchor": "middle", "font-size": 9, fill: "var(--muted)" }, p.label)); });
    if (n > 1) {
      const pos = points.map((p, i) => [X(i), Y(p.y)]);
      const curve = smoothPath(pos);
      const gradId = "trendFill" + (chartSeq++);
      const defs = el("defs");
      const grad = el("linearGradient", { id: gradId, x1: 0, y1: 0, x2: 0, y2: 1 });
      grad.appendChild(el("stop", { offset: "0", "stop-color": color, "stop-opacity": .3 }));
      grad.appendChild(el("stop", { offset: "1", "stop-color": color, "stop-opacity": 0 }));
      defs.appendChild(grad);
      s.appendChild(defs);
      s.appendChild(el("path", { d: curve + " L " + pos[n - 1][0] + " " + baseY + " L " + pos[0][0] + " " + baseY + " Z", fill: "url(#" + gradId + ")", stroke: "none" }));
      s.appendChild(el("path", { d: curve, fill: "none", stroke: color, "stroke-width": 2, "stroke-linejoin": "round", "stroke-linecap": "round" }));
    }
    points.forEach((p, i) => {
      const cx = X(i), cy = Y(p.y), isLast = i === n - 1;
      if (isLast) {
        const ring = el("circle", { cx, cy, r: 3.5, fill: "none", stroke: color, "stroke-width": 1.5 });
        ring.appendChild(el("animate", { attributeName: "r", values: "3.5;10", dur: "1.4s", repeatCount: "indefinite" }));
        ring.appendChild(el("animate", { attributeName: "opacity", values: "0.7;0", dur: "1.4s", repeatCount: "indefinite" }));
        s.appendChild(ring);
      }
      const c = el("circle", { cx, cy, r: isLast ? 4 : 3.2, fill: color });
      c.setAttribute("data-tip", p.tip);
      s.appendChild(c);
    });
    return s;
  }

  // ---- Cardio:依動作過濾後,同一天多筆合併成一次 day-run ----
  function buildDayRuns(exercise) {
    const byDate = new Map();
    sessions.forEach((s) => {
      s.cardio.forEach((c) => {
        if (c.exercise !== exercise) return;
        const cur = byDate.get(s.date) || { date: s.date, km: 0, min: 0 };
        cur.km += c.distance_km; cur.min += c.duration_min;
        byDate.set(s.date, cur);
      });
    });
    return [...byDate.values()].map((r) => ({ date: r.date, km: round2(r.km), min: r.min })).sort((a, b) => a.date.localeCompare(b.date));
  }

  function personalRecords(runs) {
    if (!runs.length) return { fastestPace: null, longestRun: null, longestTime: null, isNew: {} };
    const lastDate = runs[runs.length - 1].date;
    let fp = null, lr = null, lt = null;
    runs.forEach((r) => {
      const pace = r.min / r.km;
      if (r.km >= MIN_PR_KM && (!fp || pace < fp.pace)) fp = { pace, date: r.date, km: r.km };
      if (!lr || r.km > lr.km) lr = { km: r.km, date: r.date };
      if (!lt || r.min > lt.min) lt = { min: r.min, date: r.date };
    });
    return {
      fastestPace: fp, longestRun: lr, longestTime: lt,
      isNew: { fastestPace: !!fp && fp.date === lastDate, longestRun: !!lr && lr.date === lastDate, longestTime: !!lt && lt.date === lastDate },
    };
  }

  function avgPace(runs) {
    const wavg = (arr) => { const km = arr.reduce((a, r) => a + r.km, 0), min = arr.reduce((a, r) => a + r.min, 0); return km > 0 ? min / km : null; };
    const last5 = runs.slice(-5), prev5 = runs.slice(-10, -5);
    const pace = last5.length ? wavg(last5) : null;
    const prev = prev5.length === 5 ? wavg(prev5) : null;
    return { pace, deltaSec: pace != null && prev != null ? (prev - pace) * 60 : null, sampleSize: last5.length };
  }

  function weeklyDistance(runs, todayStr, n) {
    const agg = new Map();
    runs.forEach((r) => { const ws = weekStart(r.date); const cur = agg.get(ws) || { km: 0 }; cur.km += r.km; agg.set(ws, cur); });
    const cur = weekStart(todayStr), out = [];
    for (let i = n - 1; i >= 0; i--) { const ws = addDays(cur, -7 * i); const a = agg.get(ws); out.push({ weekStart: ws, km: a ? round1(a.km) : 0, isCurrent: i === 0 }); }
    return out;
  }

  // ---- 重訓:單一動作每次出現的 session 統計(單組最大重量 + 當次總量) ----
  function strengthSessionStats(exercise) {
    const stats = [];
    sessions.forEach((s) => {
      let sets = [], unit = "";
      s.strength.forEach((ex) => {
        if (ex.exercise !== exercise) return;
        unit = ex.unit || "";
        ex.sets.forEach((st) => { if (st.weight != null) sets.push(st); });
      });
      if (!sets.length) return;
      const maxWeight = Math.max(...sets.map((st) => st.weight));
      const volume = Math.round(sets.reduce((a, st) => a + st.weight * (st.reps || 0), 0));
      stats.push({ date: s.date, unit, maxWeight, volume });
    });
    return stats.sort((a, b) => a.date.localeCompare(b.date));
  }
  function strengthWeightPR(stats) {
    if (!stats.length) return null;
    let best = stats[0];
    stats.forEach((r) => { if (r.maxWeight > best.maxWeight) best = r; });
    return { weight: best.maxWeight, unit: best.unit, date: best.date, isNew: best.date === stats[stats.length - 1].date };
  }
  function strengthVolumePR(stats) {
    if (!stats.length) return null;
    let best = stats[0];
    stats.forEach((r) => { if (r.volume > best.volume) best = r; });
    return { volume: best.volume, unit: best.unit, date: best.date, isNew: best.date === stats[stats.length - 1].date };
  }
  // 該動作史上最長連續訓練週數;isNew = 目前這波連續紀錄剛好是(或追平)史上最長
  function strengthWeeklyStreak(exercise) {
    const weekSet = new Set();
    sessions.forEach((s) => s.strength.forEach((ex) => { if (ex.exercise === exercise) weekSet.add(weekStart(s.date)); }));
    const weeks = [...weekSet].sort();
    if (!weeks.length) return null;
    let longest = 1, cur = 1, longestEndWeek = weeks[0];
    for (let i = 1; i < weeks.length; i++) {
      cur = addDays(weeks[i - 1], 7) === weeks[i] ? cur + 1 : 1;
      if (cur > longest) { longest = cur; longestEndWeek = weeks[i]; }
    }
    return { weeks: longest, recordWeek: longestEndWeek, isNew: longestEndWeek === weeks[weeks.length - 1] };
  }
  // 最近 3 次的平均重量(單純算術平均,重量本身就是量到的值,不像配速需要用距離加權)
  function strengthAvgWeight(stats) {
    const last3 = stats.slice(-3);
    if (!last3.length) return { avg: null, delta: null, sampleSize: 0, unit: "" };
    const avg = last3.reduce((a, r) => a + r.maxWeight, 0) / last3.length;
    const prev3 = stats.slice(-6, -3);
    const prevAvg = prev3.length === 3 ? prev3.reduce((a, r) => a + r.maxWeight, 0) / prev3.length : null;
    return {
      avg: Math.round(avg * 100) / 100,
      delta: prevAvg != null ? Math.round((avg - prevAvg) * 100) / 100 : null,
      sampleSize: last3.length,
      unit: last3[0].unit,
    };
  }

  // ---- 整體訓練:一週要三部位都練到才算達標週 ----
  function weekPartAgg() {
    const map = new Map();
    sessions.forEach((s) => {
      const ws = weekStart(s.date);
      const cur = map.get(ws) || { "Leg/Shoulder Day": false, "Chest/Back Day": false, "Cardio": false };
      if (cur[s.type] != null) cur[s.type] = true;
      map.set(ws, cur);
    });
    return map;
  }
  const isCompletePartWeek = (a) => !!a && WEEKLY_PARTS.every((p) => a[p]);
  function partStreak(todayStr) {
    const agg = weekPartAgg();
    let cursor = weekStart(todayStr), n = 0;
    if (isCompletePartWeek(agg.get(cursor))) n++;
    cursor = addDays(cursor, -7);
    while (isCompletePartWeek(agg.get(cursor))) { n++; cursor = addDays(cursor, -7); }
    return n;
  }
  function currentPartQuest(todayStr) {
    const ws = weekStart(todayStr);
    const a = weekPartAgg().get(ws) || { "Leg/Shoulder Day": false, "Chest/Back Day": false, "Cardio": false };
    const weekEnd = addDays(ws, 6);
    const daysLeft = Math.max(0, Math.round((parseDate(weekEnd) - parseDate(todayStr)) / DAY) + 1);
    const doneCount = WEEKLY_PARTS.filter((p) => a[p]).length;
    return { weekStart: ws, weekEnd, parts: a, doneCount, questPct: doneCount / WEEKLY_PARTS.length, daysLeft };
  }

  // ---- Activity 熱力圖:整體訓練日總覽,依當天 session 數分級 ----
  function buildDayActivity() {
    const byDate = new Map();
    sessions.forEach((s) => {
      const cur = byDate.get(s.date) || { date: s.date, count: 0, types: new Set() };
      cur.count++; cur.types.add(s.type);
      byDate.set(s.date, cur);
    });
    return byDate;
  }
  const heatmapLevel = (count) => (count <= 0 ? 0 : count === 1 ? 1 : count === 2 ? 2 : 3);
  function heatmapRange(byDate, fromDate, toDate, todayStr) {
    const lastWeek = weekStart(toDate);
    const weeks = []; let totalDays = 0;
    for (let ws = weekStart(fromDate); ws <= lastWeek; ws = addDays(ws, 7)) {
      const col = [];
      for (let d = 0; d < 7; d++) {
        const date = addDays(ws, d);
        if (date < fromDate || date > toDate || date > todayStr) { col.push(null); continue; }
        const r = byDate.get(date);
        if (r) totalDays++;
        col.push({ date, count: r ? r.count : 0, types: r ? [...r.types] : [], level: heatmapLevel(r ? r.count : 0) });
      }
      weeks.push(col);
    }
    return { weeks, totalDays, firstDate: fromDate };
  }
  const heatmap = (byDate, todayStr) => heatmapRange(byDate, addDays(todayStr, -(HEATMAP_DAYS - 1)), todayStr, todayStr);
  const heatmapYear = (byDate, year, todayStr) => heatmapRange(byDate, year + "-01-01", year + "-12-31", todayStr);
  function heatmapYears(byDate, todayStr) {
    const thisYear = Number(todayStr.slice(0, 4));
    let first = thisYear;
    byDate.forEach((_, date) => { first = Math.min(first, Number(date.slice(0, 4))); });
    const out = []; for (let y = thisYear; y >= first; y--) out.push(y); return out;
  }

  // ================= Render =================
  const now = new Date();
  const TODAY = now.getFullYear() + "-" + String(now.getMonth() + 1).padStart(2, "0") + "-" + String(now.getDate()).padStart(2, "0");
  const $ = (id) => document.getElementById(id);

  function exercisesFor(part) {
    const count = new Map();
    if (part === "Cardio") {
      sessions.forEach((s) => s.cardio.forEach((c) => count.set(c.exercise, (count.get(c.exercise) || 0) + 1)));
    } else {
      sessions.forEach((s) => s.strength.forEach((e) => { if (EXERCISE_PART[e.exercise] === part) count.set(e.exercise, (count.get(e.exercise) || 0) + 1); }));
    }
    return [...count.entries()].sort((a, b) => b[1] - a[1]).map(([name]) => name);
  }
  // 該部位最近一次練到的動作,找不到就退而求其次選最常練的
  function mostRecentExerciseIn(part) {
    for (let i = sessions.length - 1; i >= 0; i--) {
      const s = sessions[i];
      const list = part === "Cardio" ? s.cardio : s.strength.filter((e) => EXERCISE_PART[e.exercise] === part);
      if (list.length) return list[0].exercise;
    }
    return exercisesFor(part)[0] || null;
  }
  function partOfLastSession() {
    for (let i = sessions.length - 1; i >= 0; i--) {
      const s = sessions[i];
      const list = s.type === "Cardio" ? s.cardio : s.strength;
      if (!list.length) continue;
      const part = s.type === "Cardio" ? "Cardio" : EXERCISE_PART[list[0].exercise];
      if (part) return part;
    }
    return "Cardio";
  }

  let curPart = sessions.length ? partOfLastSession() : "Cardio";
  let curExercise = mostRecentExerciseIn(curPart);

  function renderHeader() {
    $("totals").textContent = sessions.length + " SESSIONS · " + sessions[0].date + " → " + sessions[sessions.length - 1].date;
    $("streakVal").textContent = partStreak(TODAY);
  }

  function renderQuest() {
    const q = currentPartQuest(TODAY);
    const ring = (part) => {
      const done = q.parts[part];
      const pct = done ? 100 : 0;
      return '<div class="qcol">' +
        '<div class="ring' + (done ? " done" : "") + '" style="background:conic-gradient(var(--accent) 0 ' + pct + '%, var(--border) ' + pct + '% 100%)">' +
          '<div><div class="v' + (done ? " accent" : "") + '">' + (done ? "✓" : "—") + "</div></div></div>" +
        '<div class="lbl">' + PART_LABEL[part].toUpperCase() + "</div>" +
      "</div>";
    };
    $("quest").innerHTML =
      '<div style="display:flex;justify-content:space-between;align-items:baseline">' +
        '<div class="lbl">WEEKLY QUEST · ' + q.weekStart + " → " + q.weekEnd + "</div>" +
        '<div class="lbl">' + q.daysLeft + " DAY" + (q.daysLeft === 1 ? "" : "S") + " LEFT</div>" +
      "</div>" +
      '<div class="row qwrap" style="margin-top:12px">' + WEEKLY_PARTS.map(ring).join("") + "</div>" +
      '<div style="margin-top:14px">' +
        '<div class="lbl">QUEST PROGRESS · ' + q.doneCount + "/3 PARTS</div>" +
        '<div class="xp" style="margin-top:7px"><i style="width:' + (q.questPct * 100).toFixed(1) + '%"></i></div>' +
      "</div>";
  }

  function renderTabs() {
    $("tabs1").innerHTML = TAB_PARTS.map((p) =>
      '<button class="tabBtn' + (p === curPart ? " on" : "") + '" data-part="' + p + '" style="--tab-c:' + TAB_COLOR[p] + '">' + p + "</button>"
    ).join("");
    $("tabs2").innerHTML = exercisesFor(curPart).map((name) =>
      '<button class="tabBtn' + (name === curExercise ? " on" : "") + '" data-ex="' + name + '" style="--tab-c:' + TAB_COLOR[curPart] + '">' + name + "</button>"
    ).join("");
  }

  function prCard(isNew, icon, value, label, date) {
    return '<div class="pr' + (isNew ? " new" : "") + '">' +
      (isNew ? '<span class="tag">NEW!</span>' : "") +
      '<div class="t">' + icon + "</div>" +
      '<div class="v' + (isNew ? " accent" : "") + '">' + value + "</div>" +
      '<div class="lbl" style="margin-top:2px">' + label + "</div>" +
      '<div class="d">' + date + "</div>" +
    "</div>";
  }

  function renderContent() {
    const isCardio = curPart === "Cardio";
    $("prHeading").textContent = "🏆 PERSONAL RECORDS";
    [$("prHeading"), $("prBoard"), $("trendRow")].forEach((e) => {
      e.style.setProperty("--tab-c", TAB_COLOR[curPart]);
      e.style.setProperty("--tab-glow", TAB_GLOW28[curPart]);
    });

    if (isCardio) {
      const runs = buildDayRuns(curExercise);
      const pr = personalRecords(runs);
      $("prBoard").innerHTML =
        prCard(pr.isNew.fastestPace, "⚡", pr.fastestPace ? formatPace(pr.fastestPace.pace) : "—", "FASTEST PACE /km",
          pr.fastestPace ? pr.fastestPace.date + " · " + pr.fastestPace.km + " km" : "no run ≥ " + MIN_PR_KM + " km") +
        prCard(pr.isNew.longestRun, "🥇", pr.longestRun ? pr.longestRun.km + " km" : "—", "LONGEST RUN", pr.longestRun ? pr.longestRun.date : "—") +
        prCard(pr.isNew.longestTime, "⏱️", pr.longestTime ? pr.longestTime.min + " min" : "—", "LONGEST TIME", pr.longestTime ? pr.longestTime.date : "—");

      const ap = avgPace(runs);
      const deltaLine = ap.deltaSec == null ? "" :
        Math.abs(ap.deltaSec) < 1 ? '<div class="delta flat">same as previous 5</div>' :
        '<div class="delta ' + (ap.deltaSec > 0 ? "up" : "down") + '">' +
          (ap.deltaSec > 0 ? "▲ " + Math.round(ap.deltaSec) + " sec faster" : "▼ " + Math.round(-ap.deltaSec) + " sec slower") +
          " than previous 5</div>";
      const wd = weeklyDistance(runs, TODAY, 8);
      const maxKm = Math.max(1, ...wd.map((x) => x.km));
      $("trendRow").style.justifyContent = "";
      $("trendRow").innerHTML =
        '<div class="card" id="weeklyDist" style="flex:2.2">' +
          '<div style="display:flex;justify-content:space-between;align-items:baseline">' +
            '<b style="font-size:13px">WEEKLY DISTANCE</b>' +
            '<span class="lbl">THIS WEEK <span class="num accent" style="font-size:12px">' + wd[wd.length - 1].km + " km</span></span>" +
          "</div>" +
          '<div class="bars" style="margin-top:12px">' +
            wd.map((x) => '<span class="slot" data-tip="' + x.weekStart + " · " + x.km + ' km">' +
              '<i class="' + (x.km > 0 ? "on" : "") + (x.isCurrent ? " cur" : "") + '" style="height:' + Math.max(2, (x.km / maxKm) * 100) + '%"></i></span>').join("") +
          "</div>" +
          '<div class="barx">' + wd.map((x) => "<span>" + (x.isCurrent ? "NOW" : x.weekStart.slice(5).replace("-", "/")) + "</span>").join("") + "</div>" +
        "</div>" +
        '<div class="card" id="avgPace" style="flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center">' +
          '<div class="lbl">AVG PACE · LAST ' + ap.sampleSize + " RUN" + (ap.sampleSize === 1 ? "" : "S") + "</div>" +
          '<div class="num accent paceBig">' + formatPace(ap.pace) + "</div>" +
          '<div class="lbl" style="letter-spacing:.5px">MIN / KM</div>' + deltaLine +
        "</div>";
    } else {
      const stats = strengthSessionStats(curExercise);
      const weightPR = strengthWeightPR(stats);
      const volumePR = strengthVolumePR(stats);
      const streak = strengthWeeklyStreak(curExercise);
      $("prBoard").innerHTML =
        prCard(!!(weightPR && weightPR.isNew), "🏋️", weightPR ? weightPR.weight + " " + weightPR.unit : "—",
          "MAX WEIGHT · SET", weightPR ? weightPR.date : "—") +
        prCard(!!(volumePR && volumePR.isNew), "💪", volumePR ? volumePR.volume + " " + volumePR.unit : "—",
          "MAX VOLUME · SESSION", volumePR ? volumePR.date : "—") +
        prCard(!!(streak && streak.isNew), "🔥", streak ? streak.weeks + " WK" + (streak.weeks === 1 ? "" : "S") : "—",
          "WEEKLY STREAK", streak ? streak.recordWeek : "—");

      const recent = stats.slice(-12);
      const points = recent.map((r) => ({ label: md(parseDate(r.date)), y: r.maxWeight, tip: r.date + "：" + r.maxWeight + " " + r.unit }));

      const aw = strengthAvgWeight(stats);
      const awDeltaLine = aw.delta == null ? "" :
        Math.abs(aw.delta) < 0.01 ? '<div class="delta flat">same as previous 3</div>' :
        '<div class="delta ' + (aw.delta > 0 ? "up" : "down") + '">' +
          (aw.delta > 0 ? "▲ " + aw.delta + " " + aw.unit + " heavier" : "▼ " + Math.abs(aw.delta) + " " + aw.unit + " lighter") +
          " than previous 3</div>";
      $("trendRow").innerHTML =
        '<div class="card" id="weightTrendCard" style="flex:2.2; max-width:480px;">' +
          '<b style="font-size:13px">' + (curExercise || "") + " Trend</b>" +
          '<div class="lbl" style="margin:2px 0 8px">LAST ' + points.length + " SESSION" + (points.length === 1 ? "" : "S") + "</div>" +
        "</div>" +
        '<div class="card" id="avgPace" style="flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center">' +
          '<div class="lbl">AVG WEIGHT · LAST ' + aw.sampleSize + " SESSION" + (aw.sampleSize === 1 ? "" : "S") + "</div>" +
          '<div class="num accent paceBig">' + (aw.avg != null ? aw.avg + " " + aw.unit : "—") + "</div>" +
          awDeltaLine +
        "</div>";
      if (points.length) $("weightTrendCard").appendChild(lineChart(points, TAB_COLOR[curPart]));
    }
  }

  function renderActivity(view) {
    const byDate = buildDayActivity();
    const hm = view === "recent" ? heatmap(byDate, TODAY) : heatmapYear(byDate, Number(view), TODAY);
    const scope = view === "recent" ? "THE PAST " + HEATMAP_DAYS + " DAYS" : view;
    const years = heatmapYears(byDate, TODAY);

    let lastMon = -1;
    const monCells = hm.weeks.map((col, i) => {
      const first = col.find((c) => c);
      const d = parseDate(first ? first.date : hm.firstDate);
      const mo = d.getMonth();
      const show = mo !== lastMon && d.getDate() <= 7;
      if (show) lastMon = mo;
      return '<span style="grid-column:' + (i + 1) + '">' + (show ? MON[mo] : "") + "</span>";
    }).join("");

    const cells = hm.weeks.map((col) => col.map((c) => c
      ? '<i class="l' + c.level + '" data-tip="' + c.date + " · " + (c.count ? c.types.join("/") : "rest") + '"' + (c.count ? ' data-date="' + c.date + '"' : "") + '></i>'
      : '<i class="empty"></i>'
    ).join("")).join("");

    const tabs = ["recent"].concat(years).map((v) => {
      const on = String(v) === String(view);
      return '<button class="tabBtn' + (on ? " on" : "") + '" data-view="' + v + '">' + (v === "recent" ? "RECENT" : v) + "</button>";
    }).join("");

    const gridCols = "grid-template-columns:repeat(" + hm.weeks.length + ",13px)";
    $("activity").style.setProperty("--tab-c", "var(--hm3)");
    $("activity").style.setProperty("--tab-glow", "rgba(92, 208, 255, .25)");
    $("activity").innerHTML =
      '<div style="display:flex;justify-content:space-between;align-items:baseline;gap:12px;flex-wrap:wrap">' +
        '<b style="font-size:13px">ACTIVITY</b>' +
        '<div class="tabRow">' + tabs + "</div>" +
      "</div>" +
      '<div class="lbl" style="margin:6px 0 12px">' + hm.totalDays + " TRAINING DAY" + (hm.totalDays === 1 ? "" : "S") + " IN " + scope + "</div>" +
      '<div class="hmBody">' +
        '<div class="hmDays"><span>Mon</span><span></span><span>Wed</span><span></span><span>Fri</span><span></span><span></span></div>' +
        '<div class="hmScroll" id="hmScroll">' +
          '<div class="hmMon" style="' + gridCols + '">' + monCells + "</div>" +
          '<div class="hmGrid" style="' + gridCols + '">' + cells + "</div>" +
        "</div>" +
      "</div>" +
      '<div class="hmLegend">LESS<i style="background:var(--hm0)"></i><i style="background:var(--hm1)"></i><i style="background:var(--hm2)"></i><i style="background:var(--hm3)"></i>MORE</div>';

    const sc = $("hmScroll");
    const todayCol = hm.weeks.findIndex((col) => col.some((c) => c && c.date === TODAY));
    sc.scrollLeft = todayCol < 0 ? 0 : Math.max(0, (todayCol + 1) * 17 - sc.clientWidth);
  }

  function renderAll() {
    renderHeader();
    renderQuest();
    renderTabs();
    renderContent();
  }

  if (sessions.length) {
    renderAll();
    renderActivity("recent");

    document.body.addEventListener("click", (e) => {
      const cell = e.target.closest("[data-date]");
      if (cell) { openDayModal(cell.dataset.date); return; }
      const partBtn = e.target.closest("[data-part]");
      if (partBtn) { curPart = partBtn.dataset.part; curExercise = mostRecentExerciseIn(curPart); renderTabs(); renderContent(); return; }
      const exBtn = e.target.closest("[data-ex]");
      if (exBtn) { curExercise = exBtn.dataset.ex; renderTabs(); renderContent(); return; }
      const viewBtn = e.target.closest("[data-view]");
      if (viewBtn) renderActivity(viewBtn.dataset.view);
    });
  } else {
    $("totals").textContent = "No data.";
  }

  // 提示框:滑鼠 hover 即時跟著移動;觸控裝置沒有 hover,改成點一下顯示、再點別處收起
  const tip = $("tip");
  if (tip) {
    let tipEl = null;
    const placeTip = (x, y) => {
      tip.style.left = Math.min(x + 12, window.innerWidth - tip.offsetWidth - 6) + "px";
      tip.style.top = (y + 14) + "px";
    };
    const showTip = (el, x, y) => { tipEl = el; tip.textContent = el.getAttribute("data-tip"); tip.style.opacity = "1"; placeTip(x, y); };
    const hideTip = () => { tipEl = null; tip.style.opacity = "0"; };

    document.addEventListener("mouseover", (e) => { const el = e.target.closest && e.target.closest("[data-tip]"); if (el) showTip(el, e.clientX, e.clientY); });
    document.addEventListener("mousemove", (e) => { if (tipEl) placeTip(e.clientX, e.clientY); });
    document.addEventListener("mouseout", (e) => { const el = e.target.closest && e.target.closest("[data-tip]"); if (el && el === tipEl) hideTip(); });

    document.addEventListener("click", (e) => {
      const el = e.target.closest && e.target.closest("[data-tip]");
      if (!el) { hideTip(); return; }
      if (el.hasAttribute("data-date")) { hideTip(); return; }  // 有紀錄的格子交給詳情小卡
      if (el === tipEl) { hideTip(); return; }
      showTip(el, e.clientX, e.clientY);
    });
  }

  // 熱力圖某日詳情小卡:點有紀錄的格子跳出當日總覽,後方頁面模糊
  function fmtPace(min, km) {
    if (!(km > 0) || !(min > 0)) return "—";
    const p = min / km, mm = Math.floor(p), ss = Math.round((p - mm) * 60);
    return ss === 60 ? (mm + 1) + ":00" : mm + ":" + String(ss).padStart(2, "0");
  }
  const esc = (s) => String(s).replace(/[&<>"]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
  function dayModalHTML(date) {
    const day = sessions.filter((s) => s.date === date);
    const d = parseDate(date);
    const WK = ["日", "一", "二", "三", "四", "五", "六"];
    const types = [...new Set(day.map((s) => s.type))];
    let h = '<div class="dc"><button class="close" data-dc-close aria-label="Close">✕</button>';
    h += '<div class="dcDate">' + (d.getMonth() + 1) + " / " + d.getDate() + "</div>";
    h += '<div class="dcWk">' + d.getFullYear() + " · 星期" + WK[d.getDay()] + "</div>";
    h += '<div class="dcTypes">' + types.map((t) => '<span class="dcType">' + esc(t) + "</span>").join("") + "</div>";
    const strength = day.flatMap((s) => s.strength || []);
    const cardio = day.flatMap((s) => s.cardio || []);
    if (strength.length) {
      h += '<div class="dcSec"><div class="dcSecT">STRENGTH</div>';
      strength.forEach((ex) => {
        const u = ex.unit || "";
        h += '<div class="dcEx"><div class="dcExName">' + esc(ex.exercise) + "</div>";
        h += '<div class="dcSets">' + (ex.sets || []).map((st) => '<span class="dcSet">' + st.weight + u + " × " + st.reps + "</span>").join("") + "</div>";
        if (ex.note) h += '<div class="dcNote">' + esc(ex.note) + "</div>";
        h += "</div>";
      });
      h += "</div>";
    }
    if (cardio.length) {
      h += '<div class="dcSec"><div class="dcSecT">CARDIO</div>';
      cardio.forEach((c) => {
        h += '<div class="dcEx"><div class="dcExName">' + esc(c.exercise) + "</div>";
        h += '<div class="dcMeta">' +
          "<div><b>" + c.duration_min + "</b><span>MIN</span></div>" +
          "<div><b>" + c.distance_km + "</b><span>KM</span></div>" +
          "<div><b>" + fmtPace(c.duration_min, c.distance_km) + "</b><span>MIN/KM</span></div>" +
          (c.avg_hr_bpm ? "<div><b>" + c.avg_hr_bpm + "</b><span>BPM</span></div>" : "") +
        "</div>";
        if (c.note) h += '<div class="dcNote">' + esc(c.note) + "</div>";
        h += "</div>";
      });
      h += "</div>";
    }
    const notes = day.map((s) => s.note).filter(Boolean);
    if (notes.length) h += '<div class="dcSec"><div class="dcSecT">NOTE</div><div class="dcNoteMain">' + notes.map(esc).join("\n") + "</div></div>";
    return h + "</div>";
  }
  const dayModal = $("dayModal");
  const openDayModal = (date) => { if (dayModal) { dayModal.innerHTML = dayModalHTML(date); dayModal.classList.add("on"); document.body.style.overflow = "hidden"; } };
  const closeDayModal = () => { if (dayModal) { dayModal.classList.remove("on"); document.body.style.overflow = ""; } };
  if (dayModal) dayModal.addEventListener("click", (e) => { if (e.target === dayModal || (e.target.closest && e.target.closest("[data-dc-close]"))) closeDayModal(); });

  // 頭像放大檢視:點頭像開,點背景/✕/Esc 關
  const box = $("lightbox");
  const closeBox = () => { box.classList.remove("on"); document.body.style.overflow = ""; };
  $("avatar").addEventListener("click", () => { box.classList.add("on"); document.body.style.overflow = "hidden"; });
  box.addEventListener("click", closeBox);
  document.addEventListener("keydown", (e) => { if (e.key === "Escape") { closeBox(); closeDayModal(); } });
})();
</script>
</body>
</html>
