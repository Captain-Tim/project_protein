name: Deploy dashboard to GitHub Pages

on:
  push:
    branches: [master]
    paths:
      - 'data/**'
      - 'dashboard-captain.html'
      - 'dashboard-monkey.html'
      - 'profile/**'
      - 'scripts/build_dashboard.js'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      # 資料不完整(缺 distance_km / duration_min)會 exit 1,讓部署直接失敗——壞資料不准上線。
      - run: node scripts/build_dashboard.js Captain
      - run: node scripts/build_dashboard.js Monkey
      # Pages 上只有 _site 裡的東西。Captain 頁同時當首頁(index.html),
      # 也保留原檔名(已分享出去的 dashboard-captain.html 連結不會壞)。
      - run: |
          mkdir -p _site
          cp dashboard-captain.html _site/index.html
          cp dashboard-captain.html _site/dashboard-captain.html
          cp dashboard-monkey.html _site/
          cp -r profile _site/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
