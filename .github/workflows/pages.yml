name: Deploy dashboard to GitHub Pages

on:
  push:
    branches: [master]
    paths:
      - 'data/sessions/**'
      - 'dashboard.html'
      - 'dashboard-monkey.html'
      - 'profile/**'
      - 'scripts/build_dashboard.js'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node scripts/build_dashboard.js
      # Pages 上只有 _site 裡的東西。dashboard.html 同時複製成 index.html(首頁)與
      # dashboard.html(讓 Monkey 頁的「Tim ›」連結在線上也指得到)。
      - run: |
          mkdir -p _site
          cp dashboard.html _site/index.html
          cp dashboard.html _site/dashboard.html
          cp dashboard-monkey.html _site/
          cp -r profile _site/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
